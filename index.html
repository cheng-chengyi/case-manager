<script>
// ─── Data Store ────────────────────────────────────────────────
const STORAGE_KEY = 'case_mgmt_v4';

const defaultCases = [];

// 追蹤軸：每個案件可有多條並行追蹤軸
const defaultTracks = [];


// 取得本地日期字串（避免 toISOString 的 UTC 時區問題）
function localToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// 期限管理類型篩選（null = 全部顯示）
var dlTypeFilter = null;
function toggleDlType(type) {
  dlTypeFilter = dlTypeFilter === type ? null : type;
  render();
}

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { cases: defaultCases, tracks: defaultTracks, progress: [] };
}
function saveData(data) {
  data._date = new Date().toISOString();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  // 自動上傳到 GitHub（背景靜默）
  ghAutoSync(data);
}
var _ghSyncTimer = null;
function ghAutoSync(data) {
  // 防抖：2秒內多次儲存只推一次
  clearTimeout(_ghSyncTimer);
  _ghSyncTimer = setTimeout(function() { ghPushSilent(data); }, 2000);
}
let db = loadData();
// 排除清單：永久封鎖假設資料
var _EXCLUDED_IDS = new Set(["A001","A002","A003","A004","A005","1140923_鄭淑惠(行人車禍)"]);
if (db.cases && db.cases.some(function(c){ return _EXCLUDED_IDS.has(c.id); })) {
  db.cases = db.cases.filter(function(c){ return !_EXCLUDED_IDS.has(c.id); });
  db.tracks = (db.tracks||[]).filter(function(t){ return !_EXCLUDED_IDS.has(t.caseId); });
  db.progress = (db.progress||[]).filter(function(p){ return !_EXCLUDED_IDS.has(p.caseId); });
  try { localStorage.setItem("cm_data", JSON.stringify(db)); } catch(e) {}
}
if (!db.cases) db.cases = defaultCases;
if (!db.tracks) db.tracks = defaultTracks;
if (!db.progress) db.progress = [];
if (!db.todos) db.todos = [];
var _pid = 1;
db.progress.forEach(function(p){ if (!p.id) p.id = 'P' + String(_pid++).padStart(4,'0'); });
function genProgressId() {
  var nums = db.progress.map(function(p){ return parseInt((p.id||'').slice(1))||0; });
  return 'P' + String((nums.length ? Math.max.apply(null,nums) : 0) + 1).padStart(4,'0');
}
function genTrackId(caseId) {
  const prefix = 'TR-' + caseId + '-';
  const nums = db.tracks.filter(t => t.id.startsWith(prefix)).map(t => parseInt(t.id.slice(prefix.length))||0);
  const max = nums.length ? Math.max(...nums) : 0;
  return prefix + (max + 1);
}
function genTodoId() {
  const nums = db.todos.map(t => parseInt((t.id||'').slice(1))||0);
  return 'T' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(4,'0');
}

// ─── Helpers ───────────────────────────────────────────────────
const typeColor = {
  '勞工保險給付':'badge-blue','職災保險給付':'badge-red','農保給付':'badge-green','公保給付':'badge-teal',
  '職災補償賠償':'badge-orange','商業保險理賠':'badge-purple','勞資爭議事項':'badge-gray',
  '勞保生育給付':'badge-blue','勞保傷病給付':'badge-blue','勞保失能給付':'badge-blue','勞保老年給付':'badge-blue','勞保死亡給付':'badge-blue',
  '職保醫療給付':'badge-red','職保傷病給付':'badge-red','職保失能給付':'badge-red','職保死亡給付':'badge-red',
  '爭議審議訴願':'badge-gray','車禍處理程序':'badge-red','職災補償賠償':'badge-orange','勞資爭議事項':'badge-gray',
  '壽險':'badge-purple','醫療險':'badge-purple','意外險':'badge-purple','失能險':'badge-purple','長照險':'badge-purple','強制險':'badge-purple'
};
const statusColor = {
  '未申請': 'status-pending', '待補件': 'status-pending', '審核中': 'status-review',
  '已給付': 'status-closed', '已拒賠': 'status-lawsuit', '申訴中': 'status-active',
  '評議中': 'status-review', '未調解': 'status-pending', '已調解完成': 'status-closed',
  '調解不成立': 'status-lawsuit', '偵查庭': 'status-mediation', '刑事訴訟': 'status-lawsuit',
  '民事訴訟': 'status-lawsuit', '爭議審議': 'status-active', '訴願中': 'status-active', '撤案': 'status-closed'
};
const stageColor = {
  '未申請': 'badge-gray', '待補件': 'badge-yellow', '審核中': 'badge-orange',
  '已給付': 'badge-green', '已拒賠': 'badge-red', '申訴中': 'badge-blue',
  '評議中': 'badge-orange', '未調解': 'badge-gray', '已調解完成': 'badge-green',
  '調解不成立': 'badge-red', '偵查庭': 'badge-teal', '刑事訴訟': 'badge-red',
  '民事訴訟': 'badge-red', '爭議審議': 'badge-blue', '訴願中': 'badge-blue', '撤案': 'badge-gray'
};

function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtDate(d) {
  if (!d) return '-';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const roc = parseInt(parts[0]) - 1911;
  return roc + '年' + parts[1] + '月' + parts[2] + '日';
}
function fmtDateTime(dt) {
  if (!dt) return '';
  const datePart = dt.includes('T') ? dt.split('T')[0] : dt;
  return fmtDate(datePart);
}
function rocHint(inputId) {
  const el = document.getElementById(inputId);
  if (!el || !el.value) return '';
  return fmtDate(el.value);
}
function daysUntil(d) {
  if (!d) return null;
  // 用本地日期計算，避免 UTC 時區差異
  const parts = d.split('-');
  const target = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.ceil((target - today) / 86400000);
}
function daysBadge(days) {
  if (days === null) return '';
  if (days < 0) return `<span class="badge badge-red">已逾期 ${Math.abs(days)} 天</span>`;
  if (days <= 14) return `<span class="days-urgent deadline-days">${days} 天後</span>`;
  if (days <= 30) return `<span class="days-soon deadline-days">${days} 天後</span>`;
  return `<span class="days-ok deadline-days">${days} 天後</span>`;
}
function genId() {
  const ids = db.cases.map(c => c.id).filter(id => /^A\d+$/.test(id)).map(id => parseInt(id.slice(1)));
  const max = ids.length ? Math.max(...ids) : 0;
  return 'A' + String(max + 1).padStart(3, '0');
}

// ─── Navigation ────────────────────────────────────────────────
let currentView = 'dashboard';
let selectedCase = null;
let filterType = null;
let filterStatus = null;
let searchQuery = '';
let caseSortBy = 'id'; // 'id','status','deadline','planned'
let caseSortDir = 'asc';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let progressView = 'list';
let progressFilter = '';
let progressSortCol = 'case';
let progressSortDir = 'asc';

function navigate(view, caseId = null) {
  if (view !== 'cases') filterStatus = null;
  currentView = view;
  selectedCase = caseId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  let navId = view === 'case-detail' ? 'cases' : view;
  if (view === 'progress') navId = 'progress-' + progressView;
  const nav = document.getElementById('nav-' + navId);
  if (nav) nav.classList.add('active');
  // 手機版：關閉側欄
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  render();
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = views[currentView]();
  // 插入手機版選單按鈕
  const topbar = main.querySelector('.topbar');
  if (topbar) {
    const btn = document.createElement('button');
    btn.className = 'mobile-menu-btn';
    btn.onclick = toggleSidebar;
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
    topbar.insertBefore(btn, topbar.firstChild);
  }
  // 更新側欄日期
  const _d = new Date();
  const _wd = ['日','一','二','三','四','五','六'];
  const sdEl = document.getElementById('sidebar-date');
  if (sdEl) sdEl.textContent = (_d.getFullYear()-1911) + '年' + String(_d.getMonth()+1).padStart(2,'0') + '月' + String(_d.getDate()).padStart(2,'0') + '日 星期' + _wd[_d.getDay()];
}

function renderCaseTable() {
  var tbody = document.getElementById('case-table-body');
  if (!tbody) { render(); return; }
  var list = db.cases;
  if (filterType) {
    if (Array.isArray(filterType)) list = list.filter(function(c){ return filterType.indexOf(c.type) >= 0; });
    else list = list.filter(function(c){ return c.type === filterType; });
  }
  if (filterStatus) {
    if (filterStatus === '_closed') list = list.filter(function(c){ return ['已給付','已調解完成','已結案','撤案'].indexOf(c.status) >= 0; });
    else if (filterStatus === '_active') list = list.filter(function(c){ return ['已給付','已調解完成','已結案','撤案','未申請'].indexOf(c.status) < 0; });
    else list = list.filter(function(c){ return c.status === filterStatus; });
  }
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    list = list.filter(function(c){ return c.name.includes(q) || c.id.toLowerCase().includes(q) || c.employer.includes(q) || (c.insuredUnit||'').includes(q) || (c.insurer||'').includes(q); });
  }
  if (caseSortBy) {
    list = [].concat(list).sort(function(a,b){
      var va,vb;
      if (caseSortBy==='id'){va=a.id;vb=b.id;}
      else if (caseSortBy==='status'){va=a.status||'';vb=b.status||'';}
      else if (caseSortBy==='deadline'){va=a.deadline||'9999';vb=b.deadline||'9999';}
      else if (caseSortBy==='planned'){va=a.plannedDate||'9999';vb=b.plannedDate||'9999';}
      if (va<vb) return caseSortDir==='asc'?-1:1;
      if (va>vb) return caseSortDir==='asc'?1:-1;
      return 0;
    });
  }
  // Update count
  var countEl = document.querySelector('.topbar-title .text-muted');
  if (countEl) countEl.textContent = '（' + list.length + ' 筆' + (filterStatus ? ' · 篩選：'+(filterStatus==='_closed'?'已結案/完成':filterStatus==='_active'?'進行中':filterStatus) : '') + '）';
  // Update tbody
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><p>找不到符合的個案</p></div></td></tr>';
  } else {
    tbody.innerHTML = list.map(function(c){
      var daysP = daysUntil(c.plannedDate);
      return '<tr onclick="navigate(\'case-detail\',\''+c.id+'\')">'
        + '<td><span style="font-family:\'Playfair Display\';font-weight:600;color:var(--navy)">'+esc(c.id)+'</span></td>'
        + '<td><strong>'+esc(c.name)+'</strong></td>'
        + '<td><span class="badge '+(typeColor[c.type]||'badge-gray')+'">'+esc(c.type)+'</span></td>'
        + '<td style="max-width:140px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">'+esc(c.employer)+'</div>'+(c.insurer?'<div style="font-size:14px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">'+esc(c.insurer)+'</div>':'')+'</td>'
        + '<td><span class="badge '+(statusColor[c.status]||'badge-gray')+'">'+c.status+'</span></td>'
        + '<td>'+(c.plannedDate ? '<div style="font-size:14px;font-weight:600;color:#0EA5B0">'+fmtDate(c.plannedDate)+'</div><div style="font-size:14px;color:var(--text-3)">'+esc(c.plannedDateNote)+'</div>'+daysBadge(daysP) : '<span style="color:var(--text-3);font-size:14px">未設定</span>')+'</td>'
        + '<td onclick="event.stopPropagation()" style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="openEditCase(\''+c.id+'\');event.stopPropagation()">編輯</button></td>'
        + '</tr>';
    }).join('');
  }
}

// ─── Views ─────────────────────────────────────────────────────
const views = {

// ── Dashboard ──────────────────────────────────────────────────
dashboard() {
  const cases = db.cases;
  const total = cases.length;
  const _closedStatuses = ['已給付','已調解完成','已結案','撤案'];
  const active = cases.filter(c => !_closedStatuses.includes(c.status) && c.status !== '未申請').length;
  const pending = cases.filter(c => c.status === '待補件').length;
  const closed = cases.filter(c => _closedStatuses.includes(c.status)).length;
  const typeGroups = [
    { label:'勞工保險', cls:'labor', types:['勞保生育給付','勞保傷病給付','勞保失能給付','勞保老年給付','勞保死亡給付'] },
    { label:'職災保險', cls:'injury-ins', types:['職保醫療給付','職保傷病給付','職保失能給付','職保死亡給付'] },
    { label:'公保農保', cls:'farmer', types:['農保給付','公保給付'] },
    { label:'車禍職災爭議', cls:'dispute', types:['車禍處理程序','爭議審議訴願','職災補償賠償','勞資爭議事項'] },
    { label:'商業保險', cls:'commercial', types:['壽險','醫療險','意外險','失能險','長照險','強制險'] },
  ];
  
  // 彙整近期期限：追蹤軸優先，無追蹤軸時 fallback 到案件層級
  const _dlItems = [];
  const _activeCaseIds = new Set(cases.filter(c => !_closedStatuses.includes(c.status)).map(c => c.id));
  db.tracks.filter(t => _activeCaseIds.has(t.caseId) && !_closedStatuses.includes(t.status)).forEach(t => {
    const c = cases.find(x => x.id === t.caseId);
    if (!c) return;
    if (t.deadline && !t.deadlineDone) { const d = daysUntil(t.deadline); if (d !== null && d <= 45) _dlItems.push({ dtype:'deadline', caseId:c.id, name:c.name, trackName:t.name, date:t.deadline, note:t.deadlineNote||t.name, days:d }); }
    if (t.plannedDate && !t.plannedDone) { const d = daysUntil(t.plannedDate); if (d !== null && d <= 45) _dlItems.push({ dtype:'planned', caseId:c.id, name:c.name, trackName:t.name, date:t.plannedDate, note:t.plannedDateNote||t.name, days:d }); }
  });
  cases.filter(c => _activeCaseIds.has(c.id) && !db.tracks.some(t => t.caseId === c.id)).forEach(c => {
    if (c.deadline && !c.deadlineDone) { const d = daysUntil(c.deadline); if (d !== null && d <= 45) _dlItems.push({ dtype:'deadline', caseId:c.id, name:c.name, trackName:null, date:c.deadline, note:c.deadlineNote, days:d }); }
    if (c.plannedDate && !c.plannedDone) { const d = daysUntil(c.plannedDate); if (d !== null && d <= 45) _dlItems.push({ dtype:'planned', caseId:c.id, name:c.name, trackName:null, date:c.plannedDate, note:c.plannedDateNote, days:d }); }
  });
  _dlItems.sort((a,b) => a.days - b.days);

  const _now = new Date();
  const rocY = _now.getFullYear() - 1911;
  const weekdays = ['日','一','二','三','四','五','六'];
  const today = rocY + '年' + String(_now.getMonth()+1).padStart(2,'0') + '月' + String(_now.getDate()).padStart(2,'0') + '日 星期' + weekdays[_now.getDay()];

  return `
  <div class="topbar">
    <div class="topbar-title">個案總覽</div>
    <div class="topbar-actions">
      <button class="btn btn-gold" onclick="openNewCase()">＋ 新增個案</button>
    </div>
  </div>
  <div class="content">
    <div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px">📊 案件狀態統計</div>
    <div class="stats-grid">
      <div class="stat-card all" onclick="navigate('cases')" style="cursor:pointer">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f1f3d" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="stat-label">全部個案</div>
        <div class="stat-num">${total}</div>
        
      </div>
      <div class="stat-card active" onclick="filterStatus='_active';navigate('cases')" style="cursor:pointer">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0072B2" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="stat-label">進行中</div>
        <div class="stat-num" style="color:#0072B2">${active}</div>
        
      </div>
      <div class="stat-card pending" onclick="filterStatus='待補件';navigate('cases')" style="cursor:pointer">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b7791f" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="stat-label">待補件</div>
        <div class="stat-num" style="color:#b7791f">${pending}</div>
        
      </div>
      <div class="stat-card closed" onclick="filterStatus='_closed';navigate('cases')" style="cursor:pointer">
        <div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-label">已結案/完成</div>
        <div class="stat-num" style="color:#4a5568">${closed}</div>
        
      </div>
    </div>

    <div style="font-size:14px;font-weight:700;color:var(--navy);margin:16px 0 8px">📂 案件類型分佈</div>
    <div class="type-chips">
      ${typeGroups.map(g => `
        <div class="type-chip ${g.cls}" onclick='filterType=${JSON.stringify(g.types)};navigate("cases")' style="cursor:pointer">
          <div class="type-chip-label">${g.label}</div>
          <div class="type-chip-count">${cases.filter(c=>g.types.includes(c.type)).length}</div>
        </div>
      `).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 380px;gap:20px">
      <div>
        <div class="table-card">
          <div class="table-header">
            <div style="font-size:15px;font-weight:700;color:var(--navy)">⏰ 近期期限（45天內）</div>
          </div>
          ${_dlItems.length === 0 ? '<div class="empty"><p>近期無到期事項</p></div>' : `
          <div style="padding:12px 16px">
            ${_dlItems.map(item => {
              const isDeadline = item.dtype === 'deadline';
              const cls = isDeadline ? (item.days <= 14 ? 'deadline-urgent' : item.days <= 30 ? 'deadline-soon' : 'deadline-ok') : (item.days <= 7 ? 'deadline-soon' : 'deadline-ok');
              const tagColor = isDeadline ? '#D55E00' : '#0EA5B0';
              const tagIcon = isDeadline ? '⚠️ 截止日期' : '📋 預計完成';
              return `<div class="deadline-item ${cls}" onclick="navigate('case-detail','${item.caseId}')" style="cursor:pointer">
                <div>
                  <div class="deadline-label">${esc(item.name)} <span style="font-size:14px;color:${tagColor};font-weight:700;margin-left:6px">${tagIcon}</span></div>
                  <div style="font-size:14px;color:var(--text-3);margin-top:2px">${esc(item.note)} · ${fmtDate(item.date)}${item.trackName ? ' · '+esc(item.trackName) : ''}</div>
                </div>
                ${daysBadge(item.days)}
              </div>`;
            }).join('')}
          </div>`}
        </div>
      </div>
      <div>
        <div class="table-card">
          <div class="table-header"><div style="font-size:15px;font-weight:700;color:var(--navy)">最近更新個案</div></div>
          <div>
            ${[...db.cases].sort((a,b) => b.updated.localeCompare(a.updated)).slice(0,5).map(c => `
              <div onclick="navigate('case-detail','${c.id}')" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s" onmouseenter="this.style.background='rgba(15,31,61,0.025)'" onmouseleave="this.style.background=''">
                <div style="display:flex;align-items:center;justify-content:space-between">
                  <div style="font-size:14px;font-weight:600">${esc(c.name)} <span style="color:var(--text-3);font-weight:400">${esc(c.id)}</span></div>
                  <span class="badge ${statusColor[c.status]}">${c.status}</span>
                </div>
                <div style="font-size:14px;color:var(--text-3);margin-top:3px">${c.type} · 更新：${fmtDate(c.updated)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
},

// ── Cases List ─────────────────────────────────────────────────
cases() {
  let list = db.cases;
  if (filterType) {
    if (Array.isArray(filterType)) list = list.filter(c => filterType.includes(c.type));
    else list = list.filter(c => c.type === filterType);
  }
  if (filterStatus === '_closed') list = list.filter(c => c.status === '已給付' || c.status === '已調解完成' || c.status === '已結案' || c.status === '撤案');
  else if (filterStatus === '_active') list = list.filter(c => !['已給付','已調解完成','已結案','撤案','未申請'].includes(c.status));
  else if (filterStatus) list = list.filter(c => c.status === filterStatus);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c => c.name.includes(q) || c.id.toLowerCase().includes(q) || c.employer.includes(q) || (c.insuredUnit||'').includes(q) || (c.insurer||'').includes(q));
  }
  // 排序
  if (caseSortBy) {
    list = [...list].sort((a, b) => {
      let va, vb;
      if (caseSortBy === 'id') { va = a.id; vb = b.id; }
      else if (caseSortBy === 'status') { va = a.status||''; vb = b.status||''; }
      else if (caseSortBy === 'deadline') { va = a.deadline||'9999'; vb = b.deadline||'9999'; }
      else if (caseSortBy === 'planned') { va = a.plannedDate||'9999'; vb = b.plannedDate||'9999'; }
      if (va < vb) return caseSortDir === 'asc' ? -1 : 1;
      if (va > vb) return caseSortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }
  const typeFilterGroups = [
    { label:'勞工保險', types:['勞工保險給付','勞保生育給付','勞保傷病給付','勞保失能給付','勞保老年給付','勞保死亡給付'] },
    { label:'職災保險', types:['職災保險給付','職保醫療給付','職保傷病給付','職保失能給付','職保死亡給付'] },
    { label:'公保農保', types:['農保給付','公保給付'] },
    { label:'車禍職災爭議', types:['車禍處理程序','爭議審議訴願','職災補償賠償','勞資爭議事項'] },
    { label:'商業保險', types:['商業保險理賠','壽險','醫療險','意外險','失能險','長照險','強制險'] },
  ];
  const statusLabel = filterStatus ? ' · 篩選：'+(filterStatus==='_closed'?'已結案/完成':filterStatus==='_active'?'進行中':filterStatus) : '';
  return `
  <div class="topbar">
    <div class="topbar-title">個案清單 <span class="text-muted">（${list.length} 筆${statusLabel}）</span></div>
    <div class="topbar-actions">
      ${filterStatus ? '<button class="btn btn-outline btn-sm" onclick="filterStatus=null;render()">✕ 清除狀態篩選</button>' : ''}
      <button class="btn btn-gold" onclick="openNewCase()">＋ 新增個案</button>
    </div>
  </div>
  <div class="content">
    <div class="table-card">
      <div class="table-header">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="搜尋姓名、編號、受僱公司、投保單位..." value="${searchQuery}"
            id="case-search-input"
            oncompositionstart="window._composing=true"
            oncompositionend="window._composing=false;searchQuery=this.value;renderCaseTable()"
            oninput="if(!window._composing){searchQuery=this.value;renderCaseTable()}" />
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm ${!filterType?'btn-primary':'btn-outline'}" onclick="filterType=null;render()">全部</button>
          ${typeFilterGroups.map(g => {
            const isActive = Array.isArray(filterType) && JSON.stringify(filterType) === JSON.stringify(g.types);
            return '<button class="btn btn-sm '+(isActive?'btn-primary':'btn-outline')+'" onclick=\'filterType='+JSON.stringify(g.types)+';render()\'>'+g.label+'</button>';
          }).join('')}
        </div>
      </div>
      <table>
        <thead><tr>
          <th style="cursor:pointer" onclick="if(caseSortBy==='id')caseSortDir=caseSortDir==='asc'?'desc':'asc';else{caseSortBy='id';caseSortDir='asc';}render()">個案編號 ${caseSortBy==='id'?(caseSortDir==='asc'?'▲':'▼'):''}</th><th>當事人</th><th>個案類型</th>
          <th>受僱公司/保險公司</th><th style="cursor:pointer" onclick="if(caseSortBy==='status')caseSortDir=caseSortDir==='asc'?'desc':'asc';else{caseSortBy='status';caseSortDir='asc';}render()">接案狀態 ${caseSortBy==='status'?(caseSortDir==='asc'?'▲':'▼'):''}</th><th style="color:#0EA5B0;cursor:pointer" onclick="if(caseSortBy==='planned')caseSortDir=caseSortDir==='asc'?'desc':'asc';else{caseSortBy='planned';caseSortDir='asc';}render()">📋 預計完成 ${caseSortBy==='planned'?(caseSortDir==='asc'?'▲':'▼'):''}</th>
          <th>操作</th>
        </tr></thead>
        <tbody id="case-table-body">
        ${list.length === 0 ? `<tr><td colspan="7"><div class="empty"><p>找不到符合的個案</p></div></td></tr>` :
          list.map(c => {
            const daysP = daysUntil(c.plannedDate);
            return `
            <tr onclick="navigate('case-detail','${c.id}')">
              <td><span style="font-family:'Playfair Display';font-weight:600;color:var(--navy)">${esc(c.id)}</span></td>
              <td><strong>${esc(c.name)}</strong></td>
              <td><span class="badge ${typeColor[c.type]}">${esc(c.type)}</span></td>
              <td style="max-width:140px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${esc(c.employer)}</div>${c.insurer?`<div style="font-size:14px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${esc(c.insurer)}</div>`:""}</td>
              <td><span class="badge ${statusColor[c.status]}">${c.status}</span></td>
              <td>${c.plannedDate ? `<div style="font-size:14px;font-weight:600;color:#0EA5B0">${fmtDate(c.plannedDate)}</div><div style="font-size:14px;color:var(--text-3)">${esc(c.plannedDateNote)}</div>${daysBadge(daysP)}` : '<span style="color:var(--text-3);font-size:14px">未設定</span>'}</td>
              <td onclick="event.stopPropagation()" style="white-space:nowrap">
                <button class="btn btn-outline btn-sm" onclick="openEditCase('${c.id}');event.stopPropagation()">編輯</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
},

// ── Case Detail ─────────────────────────────────────────────────
'case-detail'() {
  const c = db.cases.find(x => x.id === selectedCase);
  if (!c) return '<div class="content"><p>找不到個案</p></div>';
  const tracks = db.tracks.filter(t => t.caseId === c.id);
  const trackColors = ['#2b6cb0','#D55E00','#0072B2','#6b46c1','#E69F00','#0EA5B0','#b7791f'];
  const trackBgColors = ['rgba(43,108,176,0.06)','rgba(213,94,0,0.06)','rgba(0,114,178,0.06)',
    'rgba(107,70,193,0.06)','rgba(230,159,0,0.06)','rgba(14,165,176,0.06)','rgba(183,121,31,0.06)'];

  function renderTrack(tr, idx) {
    var col = trackColors[idx % trackColors.length];
    var bg = trackBgColors[idx % trackBgColors.length];
    var days = daysUntil(tr.deadline);
    var daysP = daysUntil(tr.plannedDate);

    var dlDone = !!tr.deadlineDone;
    var plDone = !!tr.plannedDone;
    var deadlineRow = tr.deadline
      ? '<div style="font-size:14px;display:flex;align-items:center;gap:6px;'+(dlDone?'opacity:0.5':'')+'"><input type="checkbox" '+(dlDone?'checked':'')+' onchange="markDeadlineDone(\''+tr.id+'\',\'deadline\')" style="width:14px;height:14px;cursor:pointer;accent-color:#D55E00;flex-shrink:0"><span style="color:#D55E00;font-weight:600">🔔 提醒日期：</span>'
        + fmtDate(tr.deadline) + ' ' + (dlDone ? '<span style="font-size:14px;color:#56a65c">✅'+fmtDate(tr.deadlineDoneDate)+'</span>' : daysBadge(days)) + '</div>' : '';
    var plannedRow = tr.plannedDate
      ? '<div style="font-size:14px;display:flex;align-items:center;gap:6px;'+(plDone?'opacity:0.5':'')+'"><input type="checkbox" '+(plDone?'checked':'')+' onchange="markDeadlineDone(\''+tr.id+'\',\'planned\')" style="width:14px;height:14px;cursor:pointer;accent-color:#0EA5B0;flex-shrink:0"><span style="color:#0EA5B0;font-weight:600">📋 預計完成：</span>'
        + fmtDate(tr.plannedDate) + ' ' + (plDone ? '<span style="font-size:14px;color:#56a65c">✅'+fmtDate(tr.plannedDoneDate)+'</span>' : daysBadge(daysP)) + '</div>' : '';

    var noteHtml = tr.note
      ? '<div style="font-size:14px;color:var(--text-2);padding:10px 12px;background:var(--surface-2);border-radius:6px;margin-bottom:10px">'+esc(tr.note)+'</div>' : '';

    return '<div class="card" id="track-'+tr.id+'" style="border-top:3px solid '+col+';margin-bottom:20px">'
      + '<div class="card-head" style="background:'+bg+';padding:14px 18px">'
      + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
      + '<div style="width:10px;height:10px;border-radius:50%;background:'+col+';flex-shrink:0"></div>'
      + '<span style="font-size:15px;font-weight:700;color:'+col+'">'+esc(tr.name)+'</span>'
      + '<span class="badge '+(typeColor[tr.type]||'badge-gray')+'">'+esc(tr.type)+'</span>'
      + '<span class="badge '+(statusColor[tr.status]||'badge-gray')+'">'+esc(tr.status)+'</span>'
      + '</div>'
      + (deadlineRow||plannedRow ? '<div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">'+deadlineRow+plannedRow+'</div>' : '')
      + (tr.contact ? '<div style="margin-top:8px;font-size:14px;color:var(--text-2)">👤 承辦：<strong>'+esc(tr.contact)+'</strong>'+(tr.contactPhone?' ☎ '+esc(tr.contactPhone):'')+'</div>' : '')
      + '</div>'
      + '<div class="card-body" style="padding:12px 20px">'
      + noteHtml
      + '<div style="display:flex;gap:8px">'
      + '<button class="btn btn-outline btn-sm" style="flex:1;border-color:'+col+';color:'+col+'" onclick="_trackAction(this)" data-action="addProgress" data-case="'+c.id+'" data-track="'+tr.id+'">＋ 新增進度</button>'
      + '</div></div></div>';
  }

  var tracksHtml = tracks.length === 0
    ? '<div class="card"><div class="card-body"><div class="empty"><p>尚無追蹤軸</p>'
      + '<button class="btn btn-gold" style="margin-top:12px" onclick="_trackAction(this)" data-action="addTrack" data-case="'+c.id+'">＋ 新增第一條追蹤軸</button>'
      + '</div></div></div>'
    : tracks.map(function(tr,i){ return renderTrack(tr,i); }).join('');

  var sidebarTracks = tracks.length === 0
    ? '<div class="text-muted" style="text-align:center;padding:12px;font-size:14px">尚無追蹤軸</div>'
    : tracks.map(function(tr,i){
        var col2 = trackColors[i%trackColors.length];
        var bg2 = trackBgColors[i%trackBgColors.length];
        return '<div style="padding:8px 10px;border-radius:8px;margin-bottom:6px;background:'+bg2+';border:1px solid rgba(0,0,0,0.05)">'
          + '<div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="_trackAction(this)" data-action="scrollTo" data-track="'+tr.id+'">'
          + '<div style="width:8px;height:8px;border-radius:50%;background:'+col2+';flex-shrink:0"></div>'
          + '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(tr.name)+'</div>'
          + '<div style="font-size:14px;color:var(--text-3)">'+esc(tr.type)+'</div></div>'
          + '<span class="badge '+(statusColor[tr.status]||'badge-gray')+'" style="font-size:14px">'+tr.status+'</span>'
          + '</div>'
          + '<div style="display:flex;gap:4px;margin-top:6px;padding-left:16px">'
          + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:3px 8px" onclick="_trackAction(this)" data-action="editTrack" data-track="'+tr.id+'">✏️ 編輯</button>'
          + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:3px 8px" onclick="_trackAction(this)" data-action="copyTrack" data-track="'+tr.id+'">📋 複製</button>'
          + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:3px 8px;color:#D55E00" onclick="if(confirm(\'確定刪除追蹤軸「'+tr.name.replace(/'/g,"\\'")+'」？\'))deleteTrack(\''+tr.id+'\')">🗑 刪除</button>'
          + '</div></div>';
      }).join('');

  var dateQuickHtml = '';
  var hasDateTracks = tracks.filter(function(tr){ return tr.deadline||tr.plannedDate; });
  if (hasDateTracks.length > 0) {
    var dateRows = hasDateTracks.map(function(tr){
      var rows = '';
      if (tr.deadline) {
        var d = daysUntil(tr.deadline);
        rows += '<div class="deadline-item '+(d<=14?'deadline-urgent':d<=30?'deadline-soon':'deadline-ok')+'" style="margin-bottom:6px">'
          + '<div><div style="font-size:14px;font-weight:700">'+tr.name+'</div>'
          + '<div style="font-size:14px;color:var(--text-3)">🔔 '+(tr.deadlineNote||'提醒日期')+' '+fmtDate(tr.deadline)+'</div></div>'
          + daysBadge(d) + '</div>';
      }
      if (tr.plannedDate) {
        var d2 = daysUntil(tr.plannedDate);
        rows += '<div class="deadline-item '+(d2<=7?'deadline-soon':'deadline-ok')+'" style="margin-bottom:6px">'
          + '<div><div style="font-size:14px;font-weight:700">'+tr.name+'</div>'
          + '<div style="font-size:14px;color:var(--text-3)">📋 '+(tr.plannedDateNote||'預計完成')+' '+fmtDate(tr.plannedDate)+'</div></div>'
          + daysBadge(d2) + '</div>';
      }
      return rows;
    }).join('');
    dateQuickHtml = '<div class="card"><div class="card-head">日期快覽</div><div class="card-body" style="padding:10px">' + dateRows + '</div></div>';
  }

  return `
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-outline btn-sm" onclick="navigate('cases')">← 返回</button>
      <div class="topbar-title">${esc(c.name)}｜${esc(c.id)}</div>
      <span class="badge ${statusColor[c.status]}">${c.status}</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="openEditCase('${c.id}')">編輯個案</button>
      <button class="btn btn-outline btn-sm" onclick="openAddTrack('${c.id}')" style="border-color:var(--teal);color:var(--teal)">＋ 新增追蹤軸</button>
      <button class="btn btn-gold btn-sm" onclick="openAddProgress('${c.id}','')">＋ 新增進度</button>
    </div>
  </div>
  <div class="content">
    <div class="card" style="margin-bottom:16px">
      <div class="card-head">
        當事人基本資料
        <span style="font-size:14px;color:var(--text-3);font-weight:400">共 ${tracks.length} 條追蹤軸</span>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item"><label>姓名</label><value>${esc(c.name)}</value></div>
          <div class="info-item"><label>連絡電話</label><value>${esc(c.phone)}</value></div>
          <div class="info-item"><label>地址</label><value>${esc(c.address)||'—'}</value></div>
          <div class="info-item"><label>受僱公司</label><value>${esc(c.employer)}</value></div>
          <div class="info-item"><label>投保單位</label><value>${esc(c.insuredUnit||c.employer)||'—'}</value></div>
          <div class="info-item"><label>保險公司/主管機關</label><value>${esc(c.insurer)||'—'}</value></div>
          <div class="info-item"><label>事故/起始日</label><value>${fmtDate(c.accidentDate)}</value></div>
          <div class="info-item"><label>受理日期</label><value>${fmtDate(c.receiveDate)}</value></div>
        </div>
        ${c.note ? '<div class="divider"></div><div style="font-size:14px;color:var(--text-2)">'+esc(c.note)+'</div>' : ''}
      </div>
    </div>

    <div>
        <div class="card">
          <div class="card-head">追蹤軸總覽</div>
          <div class="card-body" style="padding:0">
            ${tracks.length === 0
              ? '<div style="padding:30px;text-align:center;color:var(--text-3);font-size:14px"><p>尚無追蹤軸</p><button class="btn btn-gold" style="margin-top:12px" onclick="openAddTrack(\''+c.id+'\')">＋ 新增第一條追蹤軸</button></div>'
              : tracks.map(function(tr,i){
                var col2 = trackColors[i%trackColors.length];
                var bg2 = trackBgColors[i%trackBgColors.length];
                var days = daysUntil(tr.deadline);
                var daysP = daysUntil(tr.plannedDate);
                var dlDone2 = !!tr.deadlineDone;
                var plDone2 = !!tr.plannedDone;
                var deadlineInfo = tr.deadline ? '<span style="font-size:14px;color:#D55E00;display:inline-flex;align-items:center;gap:4px;'+(dlDone2?'opacity:0.5':'')+'"><input type="checkbox" '+(dlDone2?'checked':'')+' onchange="event.stopPropagation();markDeadlineDone(\''+tr.id+'\',\'deadline\')" style="width:13px;height:13px;cursor:pointer;accent-color:#D55E00">🔔 '+fmtDate(tr.deadline)+' '+(dlDone2?'<span style="color:#56a65c">✅'+fmtDate(tr.deadlineDoneDate)+'</span>':daysBadge(days))+'</span>' : '';
                var plannedInfo = tr.plannedDate ? '<span style="font-size:14px;color:#0EA5B0;display:inline-flex;align-items:center;gap:4px;'+(plDone2?'opacity:0.5':'')+'"><input type="checkbox" '+(plDone2?'checked':'')+' onchange="event.stopPropagation();markDeadlineDone(\''+tr.id+'\',\'planned\')" style="width:13px;height:13px;cursor:pointer;accent-color:#0EA5B0">📋 '+fmtDate(tr.plannedDate)+' '+(plDone2?'<span style="color:#56a65c">✅'+fmtDate(tr.plannedDoneDate)+'</span>':daysBadge(daysP))+'</span>' : '';
                var contactInfo = tr.contact ? '<span style="font-size:14px;color:var(--text-3)">👤 '+esc(tr.contact)+(tr.contactPhone?' ☎ '+esc(tr.contactPhone):'')+'</span>' : '';
                var trackTodos = (tr.todos||[]);
                var pendingTodos = trackTodos.filter(function(t){return !t.done});
                var doneTodos = trackTodos.filter(function(t){return t.done});
                var todoHtml = '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">'
                  + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
                  + '<span style="font-size:14px;font-weight:600;color:var(--text-2)">☑️ 待辦 '+pendingTodos.length+'/'+ trackTodos.length+'</span>'
                  + '</div>'
                  + trackTodos.map(function(todo,ti){ return {todo:todo, idx:ti}; }).sort(function(a,b){
                    var ta=a.todo, tb=b.todo;
                    // 已完成的排最後
                    if (ta.done !== tb.done) return ta.done ? 1 : -1;
                    // 先依提醒日期排序（無提醒的排後面）
                    var ra = ta.remind || '9999-12-31', rb = tb.remind || '9999-12-31';
                    if (ra !== rb) return ra < rb ? -1 : 1;
                    // 再依到期日排序（無到期日的排後面）
                    var da = ta.dueDate || '9999-12-31', db2 = tb.dueDate || '9999-12-31';
                    if (da !== db2) return da < db2 ? -1 : 1;
                    return 0;
                  }).map(function(item){
                    var todo = item.todo, ti = item.idx;
                    var nowStr2 = localToday();
                    var isOd = todo.dueDate && todo.dueDate < nowStr2 && !todo.done;
                    var remindHit = todo.remind && todo.remind <= nowStr2 && !todo.done;
                    return '<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:14px;'+(todo.done?'opacity:0.5':'')+'">'
                      + '<input type="checkbox" '+(todo.done?'checked':'')+' onchange="toggleTrackTodo(\''+tr.id+'\','+ti+')" style="width:14px;height:14px;cursor:pointer;accent-color:#0072B2;flex-shrink:0">'
                      + '<span style="flex:1;'+(todo.done?'text-decoration:line-through;color:var(--text-3)':'')+(isOd?';color:#D55E00':'')+(remindHit&&!todo.done?';font-weight:600':'')+'">'+( remindHit&&!todo.done?'⏰ ':'')+esc(todo.title)+'</span>'
                      + (todo.done && todo.doneDate ? '<span style="font-size:14px;color:#56a65c" title="完成日期">✅'+fmtDate(todo.doneDate)+'</span>' : '')
                      + (todo.dueDate ? '<span style="font-size:14px;color:'+(isOd?'#D55E00':'var(--text-3)')+'">📅'+fmtDate(todo.dueDate)+'</span>' : '')
                      + (todo.remind ? '<span style="font-size:14px;color:'+(remindHit?'#D55E00':'var(--text-3)')+'">🔔'+fmtDate(todo.remind)+'</span>' : '')
                      + '<button onclick="openEditTrackTodo(\''+tr.id+'\','+ti+')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#0072B2;padding:0 2px" title="編輯">✏️</button>'
                      + '<button onclick="removeTrackTodo(\''+tr.id+'\','+ti+')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#D55E00;padding:0 2px" title="刪除">✕</button>'
                      + '</div>';
                  }).join('')
                  + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:2px 8px;margin-top:4px" onclick="openAddTrackTodo(\''+tr.id+'\')">＋ 新增待辦</button>'
                  + '</div>';
                return '<div id="track-'+tr.id+'" style="padding:14px 18px;border-bottom:1px solid var(--border);border-left:4px solid '+col2+'">'
                  + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
                  + '<div style="width:8px;height:8px;border-radius:50%;background:'+col2+';flex-shrink:0"></div>'
                  + '<span style="font-size:14px;font-weight:700">'+esc(tr.name)+'</span>'
                  + '<span class="badge '+(typeColor[tr.type]||'badge-gray')+'" style="font-size:14px">'+esc(tr.type)+'</span>'
                  + '<span class="badge '+(statusColor[tr.status]||'badge-gray')+'" style="font-size:14px">'+esc(tr.status)+'</span>'
                  + '</div>'
                  + ((deadlineInfo||plannedInfo||contactInfo) ? '<div style="display:flex;gap:14px;margin-top:6px;flex-wrap:wrap">'+deadlineInfo+plannedInfo+contactInfo+'</div>' : '')
                  + (tr.note ? '<div style="font-size:14px;color:var(--text-3);margin-top:4px">'+esc(tr.note)+'</div>' : '')
                  + todoHtml
                  + '<div style="display:flex;gap:6px;margin-top:8px">'
                  + '<button class="btn btn-outline btn-sm" style="font-size:14px;border-color:'+col2+';color:'+col2+'" onclick="_trackAction(this)" data-action="addProgress" data-case="'+c.id+'" data-track="'+tr.id+'">＋ 新增進度</button>'
                  + '<button class="btn btn-outline btn-sm" style="font-size:14px" onclick="_trackAction(this)" data-action="editTrack" data-track="'+tr.id+'">✏️ 編輯</button>'
                  + '<button class="btn btn-outline btn-sm" style="font-size:14px" onclick="_trackAction(this)" data-action="copyTrack" data-track="'+tr.id+'">📋 複製</button>'
                  + '<button class="btn btn-outline btn-sm" style="font-size:14px;color:#D55E00" onclick="if(confirm(\'確定刪除追蹤軸「'+tr.name.replace(/'/g,"\\\\'")+'」？\'))deleteTrack(\''+tr.id+'\')">🗑 刪除</button>'
                  + '</div></div>';
              }).join('')
            }
          </div>
        </div>
      </div>

    ${(function(){
      var caseTodos = (db.todos||[]).filter(function(t){ return t.caseId === c.id || (!t.caseId && (t.title||'').indexOf(c.name) >= 0); });
      var nowStr = localToday();
      var pendingTodos = caseTodos.filter(function(t){ return !t.done; });
      var doneTodos = caseTodos.filter(function(t){ return t.done; });
      return '<div class="card" style="margin-top:16px"><div class="card-head" style="display:flex;align-items:center;justify-content:space-between">相關待辦事項 <span class="badge badge-yellow">'+pendingTodos.length+' 項未完成</span><button class="btn btn-outline btn-sm" style="font-size:14px;border-color:var(--gold);color:var(--gold)" onclick="openAddTodo(\''+c.id+'\')">＋ 新增待辦</button></div>'
        + '<div class="card-body" style="padding:0">'
        + (pendingTodos.length === 0 ? '<div style="padding:16px;text-align:center;color:var(--text-3);font-size:14px">所有待辦已完成 🎉</div>' :
          pendingTodos.sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); }).map(function(t){
            var isOverdue = t.dueDate && t.dueDate < nowStr;
            var subtasksHtml = '';
            if (t.subtasks && t.subtasks.length) {
              t.subtasks.sort(function(a,b){ return (a.dueDate||'9999').localeCompare(b.dueDate||'9999'); });
              subtasksHtml = '<div style="margin-top:6px;padding-left:4px">' + t.subtasks.map(function(s,i){
                var sOverdue = s.dueDate && s.dueDate < nowStr && !s.done;
                return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:14px">'
                  + '<input type="checkbox" '+(s.done?'checked':'')+' onchange="toggleSubtask(\''+t.id+'\','+i+')" style="width:14px;height:14px;cursor:pointer;accent-color:#0072B2">'
                  + '<span style="flex:1;'+(s.done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(s.title)+'</span>'
                  + (s.dueDate ? '<span style="font-size:14px;color:'+(sOverdue?'#D55E00':'var(--text-3)')+'">'+fmtDate(s.dueDate)+'</span>' : '')
                  + '</div>';
              }).join('') + '</div>';
            }
            return '<div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px">'
              + '<input type="checkbox" onchange="toggleTodo(\''+t.id+'\')" style="width:16px;height:16px;margin-top:2px;cursor:pointer;accent-color:#0072B2;flex-shrink:0">'
              + '<div style="flex:1;min-width:0">'
              + '<div style="font-size:14px;font-weight:600;'+(isOverdue?'color:#D55E00':'')+'">'+esc(t.title)
              + (t.subtasks&&t.subtasks.length ? ' <span style="font-size:14px;font-weight:400;color:var(--text-3)">'+t.subtasks.filter(function(s){return s.done}).length+'/'+t.subtasks.length+'</span>' : '')
              + '</div>'
              + (t.note ? '<div style="font-size:14px;color:var(--text-3);margin-top:2px">'+esc(t.note)+'</div>' : '')
              + subtasksHtml
              + '<div style="display:flex;gap:10px;margin-top:4px;font-size:14px;color:var(--text-3)">'
              + (t.dueDate ? '<span style="'+(isOverdue?'color:#D55E00;font-weight:600':'')+'">📅 '+fmtDate(t.dueDate)+'</span>' : '')
              + (t.remind ? '<span>⏰ '+fmtDate(t.remind)+'</span>' : '')
              + '</div></div>'
              + '<div style="display:flex;gap:4px;flex-shrink:0">'
              + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:2px 6px" onclick="openEditTodo(\''+t.id+'\')">✏️</button>'
              + '<button class="btn btn-outline btn-sm" style="font-size:14px;padding:2px 6px;color:#D55E00" onclick="deleteTodo(\''+t.id+'\')">🗑</button>'
              + '</div></div>';
          }).join(''))
        + (doneTodos.length ? '<div style="padding:10px 18px;border-top:1px solid var(--border);font-size:14px;color:var(--text-3)">✅ 已完成 '+doneTodos.length+' 項</div>' : '')
        + '</div></div>';
    })()}

  </div>`;
},

// ── Progress ───────────────────────────────────────────────────
progress() {
  let progs = db.progress.filter(p => db.cases.some(c => c.id === p.caseId));
  if (progressFilter) progs = progs.filter(p => p.caseId === progressFilter);

  function listView() {
    const sortIcon = (col) => progressSortCol === col ? (progressSortDir === 'asc' ? ' ▲' : ' ▼') : '';
    const thStyle = 'cursor:pointer;user-select:none;white-space:nowrap';
    const sorted = [...progs].sort((a, b) => {
      let va, vb;
      const c1 = db.cases.find(x => x.id === a.caseId);
      const c2 = db.cases.find(x => x.id === b.caseId);
      const t1 = a.trackId ? db.tracks.find(t => t.id === a.trackId) : null;
      const t2 = b.trackId ? db.tracks.find(t => t.id === b.trackId) : null;
      switch (progressSortCol) {
        case 'case': va = a.caseId||''; vb = b.caseId||''; break;
        case 'track': va = t1?t1.name:''; vb = t2?t2.name:''; break;
        case 'date': va = a.date||''; vb = b.date||''; break;
        case 'stage': va = a.stage||''; vb = b.stage||''; break;
        case 'desc': va = a.desc||''; vb = b.desc||''; break;
        case 'sendRecv': va = a.sendRecv||''; vb = b.sendRecv||''; break;
        case 'next': va = a.nextStep||''; vb = b.nextStep||''; break;
        case 'note': va = a.note||''; vb = b.note||''; break;
        default: va = a.date||''; vb = b.date||'';
      }
      const cmp = va.localeCompare(vb);
      return progressSortDir === 'asc' ? cmp : -cmp;
    });
    return `<div class="table-card">
      <table>
        <thead><tr>
          <th style="${thStyle}" onclick="toggleProgressSort('case')">個案${sortIcon('case')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('track')">追蹤軸${sortIcon('track')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('date')">日期${sortIcon('date')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('stage')">進度階段${sortIcon('stage')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('desc')">辦理事項說明${sortIcon('desc')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('sendRecv')">收/送件${sortIcon('sendRecv')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('next')">下一步${sortIcon('next')}</th>
          <th style="${thStyle}" onclick="toggleProgressSort('note')">備註${sortIcon('note')}</th>
        </tr></thead>
        <tbody>
        ${sorted.length === 0 ? `<tr><td colspan="8"><div class="empty"><p>尚無進度記錄</p></div></td></tr>` :
          sorted.map(p => {
            const c = db.cases.find(x => x.id === p.caseId);
            const tr = p.trackId ? db.tracks.find(t => t.id === p.trackId) : null;
            return `<tr onclick="navigate('case-detail','${p.caseId}')" style="cursor:pointer">
              <td><strong>${esc(p.caseId)}</strong><div style="font-size:14px;color:var(--text-3)">${c?esc(c.name):''}</div></td>
              <td style="max-width:130px">${tr ? `<div style="font-size:14px;font-weight:600">${esc(tr.name)}</div><span class="badge ${typeColor[tr.type]||'badge-gray'}" style="font-size:14px">${esc(tr.type)}</span>` : '<span style="color:var(--text-3);font-size:14px">—</span>'}</td>
              <td style="white-space:nowrap">${fmtDate(p.date)}</td>
              <td><span class="badge ${stageColor[p.stage]||'badge-gray'}">${esc(p.stage)}</span></td>
              <td style="max-width:180px">${esc(p.desc)}</td>
              <td>${p.sendRecv ? `<span class="badge ${p.sendRecv==='收件'?'badge-green':'badge-teal'}">${esc(p.sendRecv)}</span>` : '-'}</td>
              <td style="max-width:130px">${esc(p.nextStep)||'-'}${p.nextDate?`<div style="font-size:14px;color:var(--text-3)">${fmtDate(p.nextDate)}</div>`:''}</td>
              <td style="max-width:110px;color:var(--text-3);font-size:14px">${esc(p.note)||'-'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  function trackOverview() {
    if (!progressFilter) return '';
    const tracks = db.tracks.filter(t => t.caseId === progressFilter);
    if (tracks.length === 0) return '';
    return `<div class="card" style="margin-top:16px">
      <div class="card-head" style="display:flex;justify-content:space-between;align-items:center">
        <span>📂 追蹤軸總覽 <span class="badge badge-blue">${tracks.length}</span></span>
        <button class="btn btn-outline btn-sm" onclick="navigate('case-detail','${progressFilter}')">前往個案詳情</button>
      </div>
      <div class="card-body" style="padding:0">
        ${tracks.map(t => {
          const progCount = db.progress.filter(p => p.trackId === t.id).length;
          return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer" onclick="navigate('case-detail','${progressFilter}')">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600">${esc(t.name)}</div>
              <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
                <span class="badge ${typeColor[t.type]||'badge-gray'}" style="font-size:14px">${esc(t.type)}</span>
                <span class="badge ${stageColor[t.status]||'badge-gray'}" style="font-size:14px">${esc(t.status)}</span>
                <span style="font-size:14px;color:var(--text-3)">進度 ${progCount} 筆</span>
              </div>
            </div>
            <div style="text-align:right;font-size:14px;color:var(--text-3)">
              ${t.deadline ? '<div>⚠️ 期限 ' + fmtDate(t.deadline) + '</div>' : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function todoSection() {
    let todos = (db.todos||[]).filter(t => !t.done);
    if (progressFilter) todos = todos.filter(t => t.caseId === progressFilter);
    if (todos.length === 0) return '';
    return `<div class="card" style="margin-top:16px">
      <div class="card-head" style="display:flex;justify-content:space-between;align-items:center">
        <span>☐ 待辦事項 <span class="badge badge-yellow">${todos.length}</span></span>
        <button class="btn btn-outline btn-sm" onclick="navigate('todos')">查看全部</button>
      </div>
      <div class="card-body" style="padding:0">
        ${todos.map(t => {
          const isOverdue = t.dueDate && t.dueDate < localToday();
          const subDone = (t.subtasks||[]).filter(s=>s.done).length;
          const subTotal = (t.subtasks||[]).length;
          return `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px">
              <input type="checkbox" onchange="toggleTodo('${t.id}')" style="width:16px;height:16px;cursor:pointer;accent-color:#0072B2">
              <span style="font-size:14px;font-weight:600;${isOverdue?'color:#D55E00':''}">${esc(t.title)}</span>
              ${subTotal?'<span style="font-size:14px;color:var(--text-3)">'+subDone+'/'+subTotal+'</span>':''}
              ${t.dueDate?'<span style="font-size:14px;margin-left:auto;color:'+(isOverdue?'#D55E00':'var(--text-3)')+'">📅 '+fmtDate(t.dueDate)+'</span>':''}
            </div>
            ${subTotal?'<div style="padding-left:24px;margin-top:4px">'+
              (t.subtasks||[]).map((s,i)=>'<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:14px"><input type="checkbox" '+(s.done?'checked':'')+' onchange="toggleSubtask(\''+t.id+'\','+i+')" style="width:14px;height:14px;cursor:pointer;accent-color:#0072B2"><span style="'+(s.done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(s.title)+'</span>'+(s.dueDate?'<span style="font-size:14px;color:var(--text-3);margin-left:auto">'+fmtDate(s.dueDate)+'</span>':'')+'</div>').join('')
            +'</div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function calendarView() {
    const _validProgs = db.progress.filter(p => db.cases.some(c => c.id === p.caseId));
    const allProgs = progressFilter ? _validProgs.filter(p=>p.caseId===progressFilter) : _validProgs;
    const allTracks = db.tracks.filter(t => !progressFilter || t.caseId === progressFilter);
    const eventsByDate = {};
    allProgs.forEach(p => {
      if (!p.date) return;
      if (!eventsByDate[p.date]) eventsByDate[p.date] = [];
      const c = db.cases.find(x => x.id === p.caseId);
      eventsByDate[p.date].push({ type:'progress', label:esc(c?c.name:p.caseId), desc:esc(p.desc), stage:p.stage, caseId:p.caseId, badge:stageColor[p.stage]||'badge-gray', dot:'#0072B2', bg:'rgba(0,114,178,0.08)' });
    });
    allTracks.forEach(tr => {
      const c = db.cases.find(x => x.id === tr.caseId);
      if (tr.deadline) {
        if (!eventsByDate[tr.deadline]) eventsByDate[tr.deadline] = [];
        eventsByDate[tr.deadline].push({ type:'deadline', label:esc(c?c.name:tr.caseId)+' 提醒日期', desc:esc(tr.deadlineNote||tr.name), caseId:tr.caseId, badge:'badge-red', dot:'#D55E00', bg:'rgba(213,94,0,0.08)' });
      }
      if (tr.plannedDate) {
        if (!eventsByDate[tr.plannedDate]) eventsByDate[tr.plannedDate] = [];
        eventsByDate[tr.plannedDate].push({ type:'planned', label:esc(c?c.name:tr.caseId)+' 預計完成', desc:esc(tr.plannedDateNote||tr.name), caseId:tr.caseId, badge:'badge-teal', dot:'#0EA5B0', bg:'rgba(14,165,176,0.08)' });
      }
    });
    // 待辦事項到期日
    (db.todos||[]).filter(t => !t.done).forEach(t => {
      if (t.dueDate) {
        if (!eventsByDate[t.dueDate]) eventsByDate[t.dueDate] = [];
        eventsByDate[t.dueDate].push({ type:'todo', label:'☐ '+esc(t.title), desc:'', caseId:t.caseId||'', badge:'badge-yellow', dot:'#C9A84C', bg:'rgba(201,168,76,0.08)' });
      }
      (t.subtasks||[]).filter(s => !s.done && s.dueDate).forEach(s => {
        if (!eventsByDate[s.dueDate]) eventsByDate[s.dueDate] = [];
        eventsByDate[s.dueDate].push({ type:'todo', label:'☐ '+esc(s.title), desc:esc(t.title), caseId:t.caseId||'', badge:'badge-yellow', dot:'#C9A84C', bg:'rgba(201,168,76,0.08)' });
      });
    });
    const now = new Date();
    const y = calYear || now.getFullYear(), m = calMonth != null ? calMonth : now.getMonth();
    const first = new Date(y, m, 1);
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const today = localToday();
    const mLabel = (y-1911)+'年'+(m+1)+'月';
    let cellArr = [];
    // 週一開始：getDay() 0=日 -> 轉成 0=一
    const startDay = (first.getDay() + 6) % 7;
    // 上月補足
    const prevMonthDays = new Date(y, m, 0).getDate();
    for (let i=startDay-1; i>=0; i--) {
      const d = prevMonthDays - i;
      cellArr.push('<div style="min-height:90px;padding:4px 6px;overflow:hidden;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);opacity:0.5"><div style="font-size:14px;color:var(--text-3)">'+d+'</div></div>');
    }
    for (let d=1; d<=daysInMonth; d++) {
      const ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const evts = eventsByDate[ds] || [];
      const isToday = ds === today;
      cellArr.push(`<div style="min-height:90px;padding:4px 6px;overflow:hidden;border:1px solid var(--border);border-radius:6px;background:${isToday?'rgba(0,114,178,0.06)':'#fff'};${isToday?'border-color:#0072B2':''}">
        <div style="font-size:14px;font-weight:${isToday?'700':'500'};color:${isToday?'#0072B2':'var(--text-2)'};margin-bottom:2px">${d}</div>
        ${evts.slice(0,3).map(e => `<div onclick="navigate('${e.type==='todo'?'todos':'case-detail'}','${e.caseId}')" style="font-size:14px;padding:2px 4px;margin-bottom:1px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid ${e.dot};background:${e.bg||'rgba(0,0,0,0.03)'};color:var(--text)">${e.type==='deadline'?'⚠️ ':e.type==='planned'?'📋 ':e.type==='todo'?'☑️ ':'● '}${e.label}</div>`).join('')}
        ${evts.length>3?`<div style="font-size:14px;color:var(--text-3)">+${evts.length-3}項</div>`:''}
      </div>`);
    }
    // 下月補足
    const totalCells = startDay + daysInMonth;
    const remaining = (7 - totalCells % 7) % 7;
    for (let nd=1; nd<=remaining; nd++) {
      cellArr.push('<div style="min-height:90px;padding:4px 6px;overflow:hidden;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);opacity:0.5"><div style="font-size:14px;color:var(--text-3)">'+nd+'</div></div>');
    }
    // 產生表格行
    let tableRows = '';
    for (let r=0; r<cellArr.length; r+=7) {
      tableRows += '<tr>';
      for (let c=0; c<7; c++) tableRows += '<td style="padding:2px;vertical-align:top">'+(cellArr[r+c]||'')+'</td>';
      tableRows += '</tr>';
    }
    return `<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <button class="btn btn-outline btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}render()">◀</button>
      <span style="font-size:15px;font-weight:700;min-width:100px;text-align:center">${mLabel}</span>
      <button class="btn btn-outline btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}render()">▶</button>
      <button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="calYear=${now.getFullYear()};calMonth=${now.getMonth()};render()">今天</button>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:12px;font-size:14px;color:var(--text-2);flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(0,114,178,0.5);margin-right:4px;vertical-align:middle"></span>● 進度紀錄</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(213,94,0,0.5);margin-right:4px;vertical-align:middle"></span>⚠️ 截止日期</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(14,165,176,0.5);margin-right:4px;vertical-align:middle"></span>📋 預計完成</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(201,168,76,0.5);margin-right:4px;vertical-align:middle"></span>☑️ 待辦事項</span>
    </div>
    <table style="width:100%;border-collapse:separate;border-spacing:3px;table-layout:fixed">
      <thead><tr>${['一','二','三','四','五','六','日'].map(w=>'<th style="text-align:center;font-size:14px;font-weight:700;color:var(--text-3);padding:4px;background:none;border:none;text-transform:none;letter-spacing:0">'+w+'</th>').join('')}</tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
  }

  const viewContent = progressView === 'calendar' ? calendarView() : (listView() + trackOverview() + todoSection());
  return `<div class="topbar">
    <div class="topbar-title">進度追蹤</div>
    <div class="topbar-actions">
      <select class="btn btn-outline" onchange="progressFilter=this.value;render()" style="cursor:pointer">
        <option value="">全部個案</option>
        ${db.cases.map(c => `<option value="${c.id}" ${progressFilter===c.id?'selected':''}>${c.id} ${c.name}</option>`).join('')}
      </select>
      <div style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <button class="btn btn-sm" style="border-radius:0;border:none;${progressView==='list'?'background:#0072B2;color:#fff':''}" onclick="progressView='list';navigate('progress')" title="清單檢視">☰ 清單</button>
        <button class="btn btn-sm" style="border-radius:0;border:none;border-left:1px solid var(--border);${progressView==='calendar'?'background:#0072B2;color:#fff':''}" onclick="progressView='calendar';navigate('progress')" title="行事曆檢視">📅 行事曆</button>
      </div>
      <button class="btn btn-gold" onclick="openAddProgress('','')">＋ 新增進度</button>
    </div>
  </div>
  <div class="content">
    ${viewContent}
  </div>`;
},

// ── Deadlines ──────────────────────────────────────────────────
deadlines() {
  // 同時讀取追蹤軸 + 個案層級的日期
  const activeCases = db.cases.filter(c => c.status !== '已給付' && c.status !== '已調解完成' && c.status !== '撤案');
  const activeCaseIds = new Set(activeCases.map(c => c.id));

  // 統一彙整所有期限項目
  const allItems = [];

  db.tracks.filter(t => activeCaseIds.has(t.caseId) && t.status !== '已給付' && t.status !== '已調解完成' && t.status !== '撤案').forEach(t => {
    const c = db.cases.find(x => x.id === t.caseId);
    if (!c) return;
    if (t.deadline) allItems.push({ id:t.id, caseId:t.caseId, name:c.name, caseType:t.type, date:t.deadline, note:t.deadlineNote||t.name, days:daysUntil(t.deadline), trackName:t.name, done:!!t.deadlineDone, doneDate:t.deadlineDoneDate||'', dtype:'deadline', label:'⚠️ 截止日期', color:'#D55E00', bg:'rgba(213,94,0,0.06)' });
    if (t.plannedDate) allItems.push({ id:t.id, caseId:t.caseId, name:c.name, caseType:t.type, date:t.plannedDate, note:t.plannedDateNote||t.name, days:daysUntil(t.plannedDate), trackName:t.name, done:!!t.plannedDone, doneDate:t.plannedDoneDate||'', dtype:'planned', label:'📋 預計完成', color:'#0EA5B0', bg:'rgba(14,165,176,0.06)' });
  });
  // 個案層級 fallback
  activeCases.filter(c => c.deadline && !db.tracks.some(t=>t.caseId===c.id&&t.deadline)).forEach(c => {
    allItems.push({ id:c.id, caseId:c.id, name:c.name, caseType:c.type, date:c.deadline, note:c.deadlineNote||'', days:daysUntil(c.deadline), trackName:null, done:!!c.deadlineDone, doneDate:c.deadlineDoneDate||'', dtype:'deadline', label:'⚠️ 截止日期', color:'#D55E00', bg:'rgba(213,94,0,0.06)' });
  });
  activeCases.filter(c => c.plannedDate && !db.tracks.some(t=>t.caseId===c.id&&t.plannedDate)).forEach(c => {
    allItems.push({ id:c.id, caseId:c.id, name:c.name, caseType:c.type, date:c.plannedDate, note:c.plannedDateNote||'', days:daysUntil(c.plannedDate), trackName:null, done:!!c.plannedDone, doneDate:c.plannedDoneDate||'', dtype:'planned', label:'📋 預計完成', color:'#0EA5B0', bg:'rgba(14,165,176,0.06)' });
  });

  // 追蹤軸的待辦事項（提醒日期 + 到期日）
  db.tracks.filter(t => activeCaseIds.has(t.caseId) && t.status !== '已給付' && t.status !== '已調解完成' && t.status !== '撤案').forEach(t => {
    const c = db.cases.find(x => x.id === t.caseId);
    if (!c) return;
    (t.todos||[]).filter(td => !td.done).forEach((td, ti) => {
      if (td.dueDate) {
        allItems.push({ id:t.id, caseId:t.caseId, name:c.name, caseType:t.type||c.type, date:td.dueDate, note:td.title, days:daysUntil(td.dueDate), trackName:t.name, done:false, doneDate:'', dtype:'trackTodo', label:'☑️ 追蹤待辦', color:'var(--gold)', bg:'rgba(201,168,76,0.06)', isTodo:false, isTrackTodo:true, trackId:t.id, todoIdx:ti });
      }
      if (td.remind) {
        allItems.push({ id:t.id, caseId:t.caseId, name:c.name, caseType:t.type||c.type, date:td.remind, note:td.title, days:daysUntil(td.remind), trackName:t.name, done:false, doneDate:'', dtype:'remind', label:'🔔 提醒', color:'#E69F00', bg:'rgba(230,159,0,0.06)', isTodo:false, isTrackTodo:true, trackId:t.id, todoIdx:ti });
      }
    });
  });

  // 待辦事項的到期日
  (db.todos||[]).filter(t => !t.done && t.dueDate).forEach(t => {
    allItems.push({ id:t.id, caseId:t.caseId||'', name:t.title, caseType:'待辦事項', date:t.dueDate, note:t.note||'', days:daysUntil(t.dueDate), trackName:null, done:false, doneDate:'', dtype:'todo', label:'☑️ 待辦到期', color:'var(--gold)', bg:'rgba(201,168,76,0.06)', isTodo:true });
  });
  (db.todos||[]).filter(t => !t.done && t.subtasks).forEach(t => {
    (t.subtasks||[]).filter(s => !s.done && s.dueDate).forEach(s => {
      allItems.push({ id:t.id, caseId:t.caseId||'', name:t.title+' › '+s.title, caseType:'待辦細項', date:s.dueDate, note:'', days:daysUntil(s.dueDate), trackName:null, done:false, doneDate:'', dtype:'todo', label:'☑️ 待辦到期', color:'var(--gold)', bg:'rgba(201,168,76,0.06)', isTodo:true });
    });
  });

  // 類型篩選
  const typeFilterMap = {
    'deadline': ['deadline'],
    'planned': ['planned'],
    'remind': ['remind'],
    'todo': ['trackTodo', 'todo']
  };
  const filteredItems = dlTypeFilter ? allItems.filter(i => typeFilterMap[dlTypeFilter].includes(i.dtype)) : allItems;

  // 按日期排序（由近到遠）
  const pendingItems = filteredItems.filter(i => !i.done).sort((a,b) => a.date.localeCompare(b.date));
  const doneItems = filteredItems.filter(i => i.done).sort((a,b) => a.date.localeCompare(b.date));

  function itemCard(item) {
    const done = item.done;
    const accent = done ? '#56a65c' : (item.days < 0 ? '#5C1A1A' : item.days <= 7 ? '#D55E00' : item.days <= 14 ? '#b7791f' : item.days <= 30 ? '#0072B2' : '#4a5568');
    const checkAction = item.isTodo
      ? `toggleTodo('${item.id}')`
      : item.isTrackTodo
        ? `toggleTrackTodo('${item.trackId}',${item.todoIdx})`
        : `markDeadlineDone('${item.id}','${item.dtype}')`;
    const clickTarget = item.isTodo ? `navigate('todos')` : `navigate('case-detail','${item.caseId}')`;
    return `<div class="deadline-item" style="margin-bottom:6px;border-left:3px solid ${accent};display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--surface);border-radius:8px;${done?'opacity:0.55':''}">
      <input type="checkbox" ${done?'checked':''} onclick="event.stopPropagation();${checkAction}" style="width:16px;height:16px;margin-top:3px;cursor:pointer;accent-color:#56a65c;flex-shrink:0" title="${done?'取消完成':'標記完成'}">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="${clickTarget}">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:14px;font-weight:700;color:${item.color};background:${item.bg};padding:1px 8px;border-radius:4px">${item.label}</span>
          <span style="font-size:14px;font-weight:700;${done?'text-decoration:line-through;color:var(--text-3)':''}">${esc(item.name)}</span>
          <span style="font-size:14px;color:var(--text-3)">${esc(item.caseId)}</span>
        </div>
        ${item.trackName ? `<div style="font-size:14px;color:var(--text-3);margin-top:2px">追蹤軸：${esc(item.trackName)}</div>` : ''}
        <div style="font-size:14px;color:var(--text-3);margin-top:2px">${esc(item.note)} · ${fmtDate(item.date)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <span class="badge ${typeColor[item.caseType]||'badge-gray'}" style="font-size:14px">${esc(item.caseType)}</span>
          ${done && item.doneDate ? '<span style="font-size:14px;color:#56a65c">✅ 完成於 '+fmtDate(item.doneDate)+'</span>' : ''}
        </div>
      </div>
      <div style="flex-shrink:0;text-align:right">${done ? '<span class="badge badge-green" style="font-size:14px">已完成</span>' : daysBadge(item.days)}</div>
    </div>`;
  }

  // 分區：已逾期、7天內、8-14天、15-30天、30天以上
  const overdue = pendingItems.filter(i => i.days < 0);
  const d7  = pendingItems.filter(i => i.days >= 0 && i.days <= 7);
  const d14 = pendingItems.filter(i => i.days > 7 && i.days <= 14);
  const d30 = pendingItems.filter(i => i.days > 14 && i.days <= 30);
  const dLater = pendingItems.filter(i => i.days > 30);

  function section(label, color, bg, items) {
    if (!items.length) return '';
    return `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:${color};margin-bottom:8px;padding:5px 12px;background:${bg};border-radius:6px;display:flex;align-items:center;justify-content:space-between">${label}<span style="font-size:14px;font-weight:400">${items.length} 筆</span></div>
      ${items.map(itemCard).join('')}
    </div>`;
  }

  return `
  <div class="topbar">
    <div class="topbar-title">期限管理</div>
    <div class="topbar-actions" style="font-size:14px;color:var(--text-3)">共 ${pendingItems.length} 筆期限</div>
  </div>
  <div class="content">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--surface-2);border-radius:10px;align-items:center">
      <span style="font-size:14px;font-weight:600;color:var(--text-2);margin-right:4px">類型：</span>
      <span onclick="toggleDlType('deadline')" style="font-size:14px;color:#D55E00;font-weight:600;cursor:pointer;padding:3px 10px;border-radius:6px;border:2px solid ${dlTypeFilter==='deadline'?'#D55E00':'transparent'};background:${dlTypeFilter==='deadline'?'rgba(213,94,0,0.1)':'transparent'};transition:all .15s">⚠️ 截止日期</span>
      <span onclick="toggleDlType('planned')" style="font-size:14px;color:#0EA5B0;font-weight:600;cursor:pointer;padding:3px 10px;border-radius:6px;border:2px solid ${dlTypeFilter==='planned'?'#0EA5B0':'transparent'};background:${dlTypeFilter==='planned'?'rgba(14,165,176,0.1)':'transparent'};transition:all .15s">📋 預計完成</span>
      <span onclick="toggleDlType('remind')" style="font-size:14px;color:#E69F00;font-weight:600;cursor:pointer;padding:3px 10px;border-radius:6px;border:2px solid ${dlTypeFilter==='remind'?'#E69F00':'transparent'};background:${dlTypeFilter==='remind'?'rgba(230,159,0,0.1)':'transparent'};transition:all .15s">🔔 提醒</span>
      <span onclick="toggleDlType('todo')" style="font-size:14px;color:var(--gold);font-weight:600;cursor:pointer;padding:3px 10px;border-radius:6px;border:2px solid ${dlTypeFilter==='todo'?'var(--gold)':'transparent'};background:${dlTypeFilter==='todo'?'rgba(201,168,76,0.1)':'transparent'};transition:all .15s">☑️ 追蹤待辦／待辦到期</span>
    </div>

    ${section('🚫 已逾期', '#5C1A1A', 'rgba(92,26,26,0.08)', overdue)}
    ${section('🔔 7天內', '#D55E00', 'rgba(213,94,0,0.07)', d7)}
    ${section('⏰ 8–14天', '#b7791f', 'rgba(214,158,46,0.07)', d14)}
    ${section('📅 15–30天', '#0072B2', 'rgba(0,114,178,0.07)', d30)}
    ${section('📌 30天以上', '#4a5568', 'var(--surface-2)', dLater)}
    ${pendingItems.length === 0 ? '<div style="padding:40px;text-align:center;color:var(--text-3);font-size:14px">目前沒有進行中的期限項目 🎉</div>' : ''}

    ${doneItems.length > 0 ? `
    <div style="margin-top:16px">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(86,166,92,0.08);border-radius:10px;border:1px solid rgba(86,166,92,0.25);cursor:pointer" onclick="var el=document.getElementById('done-section');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.toggle-arrow').textContent=el.style.display==='none'?'▶':'▼'">
        <span style="font-size:20px">✅</span>
        <div>
          <div style="font-size:14px;font-weight:700;color:#56a65c">已完成</div>
          <div style="font-size:14px;color:var(--text-3)">點擊展開/收合</div>
        </div>
        <span style="margin-left:auto;font-size:14px;font-weight:700;color:#56a65c">${doneItems.length} 筆</span>
        <span class="toggle-arrow" style="font-size:14px;color:var(--text-3)">▶</span>
      </div>
      <div id="done-section" style="display:none;margin-top:12px">
        ${doneItems.map(itemCard).join('')}
      </div>
    </div>` : ''}
  </div>`;
},

// ── Todos ─────────────────────────────────────────────────────
todos() {
  const todos = db.todos || [];
  const pending = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);

  // 檢查提醒
  const now = new Date();
  const alerts = pending.filter(t => t.remind && t.remind <= localToday());

  const sortedPending = [...pending].sort((a,b) => {
    const now2 = new Date();
    const aAlert = a.remind && a.remind.slice(0,10) <= localToday() ? 0 : 1;
    const bAlert = b.remind && b.remind.slice(0,10) <= localToday() ? 0 : 1;
    if (aAlert !== bAlert) return aAlert - bAlert;
    const aDate = a.dueDate || a.remind || '9999';
    const bDate = b.dueDate || b.remind || '9999';
    return aDate.localeCompare(bDate);
  });
  // 子任務也按日期排序
  sortedPending.forEach(t => {
    if (t.subtasks && t.subtasks.length) {
      t.subtasks.sort((a,b) => (a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
    }
  });

  return `
  <div class="topbar">
    <div class="topbar-title">待辦事項 <span class="text-muted">（${pending.length} 項未完成）</span></div>
    <div class="topbar-actions">
      <button class="btn btn-gold" onclick="openAddTodo()">＋ 新增待辦</button>
    </div>
  </div>
  <div class="content">
    ${alerts.length ? `<div style="padding:12px 16px;background:rgba(213,94,0,0.08);border:1px solid rgba(213,94,0,0.2);border-radius:10px;margin-bottom:16px;font-size:14px;color:#D55E00">
      ⏰ 有 <strong>${alerts.length}</strong> 項待辦已到提醒日期！
    </div>` : ''}

    <!-- 未完成 -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-head">未完成 <span class="badge badge-blue">${pending.length}</span></div>
      <div class="card-body" style="padding:0">
        ${sortedPending.length === 0 ? '<div style="padding:30px;text-align:center;color:var(--text-3);font-size:14px">沒有待辦事項 🎉</div>' :
          sortedPending.map(t => {
            const isOverdue = t.dueDate && t.dueDate < localToday();
            const isAlerted = t.remind && t.remind <= localToday();
            return `<div style="padding:14px 18px;border-bottom:1px solid var(--border);${isAlerted?'background:rgba(213,94,0,0.04)':''}">
              <div style="display:flex;align-items:flex-start;gap:10px">
                <input type="checkbox" onchange="toggleTodo('${t.id}')" style="width:18px;height:18px;margin-top:2px;cursor:pointer;flex-shrink:0;accent-color:#0072B2">
                <div style="flex:1;min-width:0">
                  <div style="font-size:14px;font-weight:600;${isOverdue?'color:#D55E00':''}">
                    ${isAlerted?'⏰ ':''}${esc(t.title)}
                    ${(t.subtasks&&t.subtasks.length)?'<span style="font-size:14px;font-weight:400;color:var(--text-3);margin-left:6px">'+t.subtasks.filter(s=>s.done).length+'/'+t.subtasks.length+'</span>':''}
                  </div>
                  ${t.note?'<div style="font-size:14px;color:var(--text-3);margin-top:4px;white-space:pre-line">'+esc(t.note)+'</div>':''}
                  ${(t.subtasks&&t.subtasks.length)?'<div style="margin-top:8px;padding-left:4px">'+t.subtasks.map((s,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px"><input type="checkbox" '+(s.done?'checked':'')+' onchange="toggleSubtask(\''+t.id+'\','+i+')" style="width:15px;height:15px;cursor:pointer;accent-color:#0072B2"><span style="'+(s.done?'text-decoration:line-through;color:var(--text-3)':'')+';flex:1">'+esc(s.title)+'</span>'+(s.dueDate?'<span style="font-size:14px;color:'+(s.dueDate<localToday()&&!s.done?'#D55E00':'var(--text-3)')+'">'+fmtDate(s.dueDate)+'</span>':'')+'</div>').join('')+'</div>':''}
                  <div style="display:flex;gap:12px;margin-top:6px;font-size:14px;color:var(--text-3);flex-wrap:wrap">
                    ${t.remind?'<span>⏰ '+fmtDate(t.remind)+'</span>':''}
                    ${t.dueDate?'<span style="'+(isOverdue?'color:#D55E00;font-weight:600':'')+'">📅 '+fmtDate(t.dueDate)+'</span>':''}
                    ${t.caseId?'<span>📎 '+t.caseId+'</span>':''}
                  </div>
                </div>
              </div>

// ─── Template Functions ───────────────────────────────────────

function toggleProgressSort(col) {
  if (progressSortCol === col) {
    progressSortDir = progressSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    progressSortCol = col;
    progressSortDir = col === 'date' ? 'desc' : 'asc';
  }
  render();
}

function copyTemplate(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.querySelector('span').textContent;
    btn.querySelector('span').textContent = '✓ 已複製';
    btn.style.background = '#E6F4EA';
    btn.style.borderColor = '#34A853';
    btn.style.color = '#34A853';
    setTimeout(() => {
      btn.querySelector('span').textContent = orig;
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 1200);
  }).catch(() => {
    // fallback: select text
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.querySelector('span').textContent = '✓ 已複製';
    setTimeout(() => { btn.querySelector('span').textContent = text; }, 1200);
  });
}

function openAddTemplate(type) {
  const typeLabel = type === 'tracking' ? '追蹤紀錄' : '待辦事項';
  openFormModal('新增自訂' + typeLabel + '樣板', `

function deleteCase(id) {

// ─── Track Modal Functions ────────────────────────────────────
function _trackAction(el) {
  var action = el.getAttribute('data-action');
  var caseId = el.getAttribute('data-case');
  var trackId = el.getAttribute('data-track');
  // 清除所有追蹤軸高亮
  document.querySelectorAll('.track-highlight').forEach(function(e){ e.classList.remove('track-highlight'); });
  // 高亮當前追蹤軸
  if (trackId) {
    var card = document.getElementById('track-' + trackId);
    if (card) { card.classList.add('track-highlight'); }
  }
  if (action === 'addProgress') openAddProgress(caseId, trackId);
  else if (action === 'editTrack') openEditTrack(trackId);
  else if (action === 'copyTrack') copyTrack(trackId);
  else if (action === 'addTrack') openAddTrack(caseId);
  else if (action === 'scrollTo') {
    var el2 = document.getElementById('track-' + trackId);
    if (el2) { el2.classList.add('track-highlight'); el2.scrollIntoView({behavior: 'smooth'}); }
  }
}

function copyTrack(trackId) {
  var src = db.tracks.find(function(t){ return t.id === trackId; });
  if (!src) return;
  var newTr = {
    id: genTrackId(src.caseId), caseId: src.caseId,
    name: src.name + '（複製）',
    type: src.type, insurer: src.insurer,
    contact: src.contact || '', contactPhone: src.contactPhone || '',
    status: src.status || '未申請',
    deadline: src.deadline || '', deadlineNote: src.deadlineNote || '',
    plannedDate: src.plannedDate || '', plannedDateNote: src.plannedDateNote || '',
    note: src.note || '',
    todos: (src.todos||[]).map(function(t){ return {title:t.title, dueDate:t.dueDate, done:false, doneDate:''}; }),
    created: localToday()
  };
  db.tracks.push(newTr);
  var c = db.cases.find(function(x){ return x.id === src.caseId; });
  if (c) c.updated = localToday();
  saveData(db);
  render();
  alert('已複製追蹤軸「' + src.name + '」，請編輯修改名稱和日期。');
}
