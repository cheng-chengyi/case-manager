function markDeadlineDone(id, type) {
  // 先找追蹤軸
  var tr = db.tracks.find(function(t){ return t.id === id; });
  if (tr) {
    if (type === 'deadline') {
      tr.deadlineDone = !tr.deadlineDone;
      tr.deadlineDoneDate = tr.deadlineDone ? localToday() : '';
    } else if (type === 'planned') {
      tr.plannedDone = !tr.plannedDone;
      tr.plannedDoneDate = tr.plannedDone ? localToday() : '';
    }
  } else {
    var c = db.cases.find(function(x){ return x.id === id; });
    if (c) {
      if (type === 'deadline') {
        c.deadlineDone = !c.deadlineDone;
        c.deadlineDoneDate = c.deadlineDone ? localToday() : '';
      } else if (type === 'planned') {
        c.plannedDone = !c.plannedDone;
        c.plannedDoneDate = c.plannedDone ? localToday() : '';
      }
    }
  }
  saveData(db);
  render();
}

// ─── Modal Helper ──────────────────────────────────────────────
function openFormModal(title, body, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <h2>${title}</h2>
        <button class="btn btn-outline btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-gold" onclick="confirmModal()">確認儲存</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
  window._modalConfirm = onConfirm;
  setTimeout(() => {
    ['f-accident','f-receive','f-deadline','f-planned','fp-date','fp-next-date','ft-deadline','ft-planned','f-closed-date','ft-closed-date'].forEach(function(id) {
      var el = document.getElementById(id);
      var hint = document.getElementById('hint-'+id);
      if (el && hint && el.value) hint.textContent = rocHint(id);
    });
  }, 60);
}
function closeModal() {
  document.querySelector('.modal-overlay')?.remove();
  render();
}
function confirmModal() {
  if (window._modalConfirm && window._modalConfirm() !== false) closeModal();
}

// ─── Archive & Backup Functions ───────────────────────────────
function archiveSelected() {
  const checkboxes = document.querySelectorAll('.archive-cb:checked');
  const ids = Array.from(checkboxes).map(cb => cb.value);
  if (ids.length === 0) { alert('請至少選擇一個個案！'); return; }

  // 收集要歸檔的資料
  const archiveCases = db.cases.filter(c => ids.includes(c.id));
  const archiveTracks = db.tracks.filter(t => ids.includes(t.caseId));

  const archiveData = {
    _type: 'archive',
    _date: new Date().toISOString(),
    _note: '歸檔個案：' + archiveCases.map(c => c.id + ' ' + c.name).join('、'),
    cases: archiveCases,
    tracks: archiveTracks
  };

  // 下載
  const blob = new Blob([JSON.stringify(archiveData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '歸檔_' + ids.join('_') + '_' + localToday() + '.json';
  a.click();
  URL.revokeObjectURL(url);

  // 確認刪除
  setTimeout(function() {
    const names = archiveCases.map(c => c.id + ' ' + c.name).join('\n  ');
    if (confirm('檔案已下載。\n\n確定要從系統中刪除以下 ' + ids.length + ' 個個案？\n  ' + names + '\n\n（可隨時從備份檔還原）')) {
      db.cases = db.cases.filter(c => !ids.includes(c.id));
      db.tracks = db.tracks.filter(t => !ids.includes(t.caseId));
      db.progress = db.progress.filter(p => !ids.includes(p.caseId));
      saveData(db);
      alert('✅ 已刪除 ' + ids.length + ' 個結案個案，資料已歸檔保存。');
      render();
    }
  }, 500);
}

// 背景靜默推送（不彈訊息）
async function ghPushSilent(data) {
  const token = localStorage.getItem('gh_token');
  const repo = localStorage.getItem('gh_repo');
  if (!token || !repo) return;
  try {
    const payload = { _type:'cloud_sync', _date:new Date().toISOString(), cases:data.cases, tracks:data.tracks, progress:data.progress, todos:data.todos };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    let sha = null;
    try {
      const getRes = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', { headers:{'Authorization':'Bearer '+token} });
      if (getRes.ok) { const f = await getRes.json(); sha = f.sha; }
    } catch(e) {}
    const body = { message:'auto-sync: '+new Date().toISOString().slice(0,16), content:content };
    if (sha) body.sha = sha;
    await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', {
      method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    // 更新同步指示器

// 頁面載入自動拉取
async function ghAutoPull() {
  const token = localStorage.getItem('gh_token');
  const repo = localStorage.getItem('gh_repo');
  if (!token || !repo) return;
  try {
    const res = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', { headers:{'Authorization':'Bearer '+token} });
    if (!res.ok) return;
    const f = await res.json();
    const json = decodeURIComponent(escape(atob(f.content)));
    const remote = JSON.parse(json);
    if (!remote.cases) return;
    // 排除清單：永久封鎖假設資料和已知應排除的 ID
    const EXCLUDED_IDS = new Set(['A001','A002','A003','A004','A005','1140923_鄭淑惠(行人車禍)']);
    const remoteCases = (remote.cases || []).filter(function(c){ return !EXCLUDED_IDS.has(c.id); });
    const localCases = (db.cases || []).filter(function(c){ return !EXCLUDED_IDS.has(c.id); });
    // 如果本機有被排除的資料，清掉並存檔
    if (localCases.length < (db.cases||[]).length) {
      db.cases = localCases;
      db.tracks = (db.tracks||[]).filter(function(t){ return !EXCLUDED_IDS.has(t.caseId); });
      db.progress = (db.progress||[]).filter(function(p){ return !EXCLUDED_IDS.has(p.caseId); });
      saveData(db);
    }
    var changed = false;
    var addedCases = 0, addedTracks = 0, addedProgress = 0, addedTodos = 0;
    // 1. 合併個案：雲端有但本機沒有的加入
    var localCaseIds = new Set(localCases.map(function(c){ return c.id; }));
    var remoteCaseIds = new Set(remoteCases.map(function(c){ return c.id; }));
    var newCases = remoteCases.filter(function(c){ return !localCaseIds.has(c.id); });
    if (newCases.length > 0) {
      db.cases = localCases.concat(newCases);
      addedCases = newCases.length;
      changed = true;
    } else {
      db.cases = localCases;
    }
    // 2. 逐筆合併 tracks（用 id 去重）
    var localTrackIds = new Set((db.tracks||[]).map(function(t){ return t.id; }));
    var remoteTracks = (remote.tracks||[]).filter(function(t){ return !EXCLUDED_IDS.has(t.caseId); });
    remoteTracks.forEach(function(t) {
      if (t.id && !localTrackIds.has(t.id)) {
        db.tracks.push(t);
        addedTracks++;
        changed = true;
      }
    });
    // 3. 逐筆合併 progress（用 id 或 caseId+date+stage 去重）
    var localProgressKeys = new Set((db.progress||[]).map(function(p){ return p.id || (p.caseId+p.date+p.stage); }));
    var remoteProgress = (remote.progress||[]).filter(function(p){ return !EXCLUDED_IDS.has(p.caseId); });
    remoteProgress.forEach(function(p) {
      var key = p.id || (p.caseId+p.date+p.stage);
      if (!localProgressKeys.has(key)) {
        db.progress.push(p);
        addedProgress++;
        changed = true;
      }
    });
    // 4. 逐筆合併 todos（用 id 去重）
    if (!db.todos) db.todos = [];
    var localTodoIds = new Set(db.todos.map(function(t){ return t.id; }));
    var remoteTodos = (remote.todos||[]).filter(function(t){ return !EXCLUDED_IDS.has(t.caseId); });
    remoteTodos.forEach(function(t) {
      if (t.id && !localTodoIds.has(t.id)) {
        db.todos.push(t);
        addedTodos++;
        changed = true;
      }
    });
    // 儲存並顯示結果
    if (changed) {
      saveData(db);
      render();
      var parts = [];
      if (addedCases > 0) parts.push(addedCases + '案');
      if (addedTracks > 0) parts.push(addedTracks + '追蹤');
      if (addedProgress > 0) parts.push(addedProgress + '進度');
      if (addedTodos > 0) parts.push(addedTodos + '待辦');
      var msg = parts.length > 0 ? '☁️ +' + parts.join('+') : '☁️ 已同步';
      var ind = document.getElementById('sync-indicator');
      if (ind) { ind.textContent = msg; ind.style.color = '#0072B2'; setTimeout(function(){ ind.textContent = '☁️'; ind.style.color = 'var(--text-3)'; }, 3000); }
    }
    // 本機有但雲端沒有的，自動推送上去
    var localOnly = db.cases.filter(function(c){ return !remoteCaseIds.has(c.id); });
    var remoteTrackIds = new Set((remote.tracks||[]).map(function(rt){return rt.id}));
    var remoteProgressKeys = new Set((remote.progress||[]).map(function(rp){return rp.id||(rp.caseId+rp.date+rp.stage)}));
    var remoteTodoIds = new Set((remote.todos||[]).map(function(rt){return rt.id}));
    var localExtraTracks = (db.tracks||[]).some(function(t){ return t.id && !remoteTrackIds.has(t.id); });
    var localExtraProgress = (db.progress||[]).some(function(p){ return !remoteProgressKeys.has(p.id||(p.caseId+p.date+p.stage)); });
    var localExtraTodos = (db.todos||[]).some(function(t){ return t.id && !remoteTodoIds.has(t.id); });
    if (localOnly.length > 0 || localExtraTracks || localExtraProgress || localExtraTodos) {
      ghPushSilent(db);
    }
  } catch(e) {
    var ind = document.getElementById('sync-indicator');
    if (ind) { ind.textContent = '⚠️ 同步失敗'; ind.style.color = '#D55E00'; setTimeout(function(){ ind.textContent = '☁️'; ind.style.color = 'var(--text-3)'; }, 5000); }
  }
}

async function ghPush() {
  const token = localStorage.getItem('gh_token');
  const repo = localStorage.getItem('gh_repo');
  if (!token || !repo) { alert('請先設定 GitHub Token 和 Repository'); return; }
  ghStatus('⏳ 上傳中...');
  try {
    const data = { _type:'cloud_sync', _date:new Date().toISOString(), cases:db.cases, tracks:db.tracks, progress:db.progress, todos:db.todos };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    // Get current file SHA if exists
    let sha = null;
    try {
      const getRes = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', { headers:{'Authorization':'Bearer '+token} });
      if (getRes.ok) { const f = await getRes.json(); sha = f.sha; }
    } catch(e) {}
    const body = { message:'sync: '+new Date().toISOString().slice(0,16), content:content };
    if (sha) body.sha = sha;
    const putRes = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', {
      method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status);
    ghStatus('✅ 上傳成功！ ' + new Date().toLocaleTimeString());
  } catch(err) {
    ghStatus('❌ 上傳失敗：' + err.message, true);
  }
}

async function ghPull() {
  const token = localStorage.getItem('gh_token');
  const repo = localStorage.getItem('gh_repo');
  if (!token || !repo) { alert('請先設定 GitHub Token 和 Repository'); return; }
  ghStatus('⏳ 下載中...');
  try {
    const res = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', { headers:{'Authorization':'Bearer '+token} });
    if (!res.ok) throw new Error(res.status === 404 ? '雲端尚無資料，請先上傳' : 'HTTP ' + res.status);
    const f = await res.json();
    const json = decodeURIComponent(escape(atob(f.content)));
    const data = JSON.parse(json);
    if (!data.cases) throw new Error('資料格式不正確');
    // 排除清單：過濾假設資料
    var EXCLUDED_IDS = new Set(['A001','A002','A003','A004','A005','1140923_鄭淑惠(行人車禍)']);
    data.cases = data.cases.filter(function(c){ return !EXCLUDED_IDS.has(c.id); });
    data.tracks = (data.tracks||[]).filter(function(t){ return !EXCLUDED_IDS.has(t.caseId); });
    data.progress = (data.progress||[]).filter(function(p){ return !EXCLUDED_IDS.has(p.caseId); });
    var localCount = db.cases.length;
    var remoteCount = data.cases.length;
    var choice = confirm('雲端有 ' + remoteCount + ' 筆，本機有 ' + localCount + ' 筆。\n\n按「確定」= 合併（不遺失任何資料）\n按「取消」= 不動作');
    if (!choice) { ghStatus('已取消'); return; }
    // 合併：以本機為主，加入雲端有但本機沒有的
    var localIds = new Set(db.cases.map(function(c){ return c.id; }));
    var added = 0;
    data.cases.forEach(function(c) {
      if (!localIds.has(c.id)) { db.cases.push(c); added++; }
    });
    var localTrackIds = new Set((db.tracks||[]).map(function(t){ return t.id; }));
    (data.tracks||[]).forEach(function(t) {
      if (!localTrackIds.has(t.id)) { db.tracks.push(t); }
    });
    var localProgressIds = new Set((db.progress||[]).map(function(p){ return p.id || (p.caseId+p.date+p.stage); }));
    (data.progress||[]).forEach(function(p) {
      var pid = p.id || (p.caseId+p.date+p.stage);
      if (!localProgressIds.has(pid)) { db.progress.push(p); }
    });
    // 合併 todos
    if (!db.todos) db.todos = [];
    var localTodoIds = new Set(db.todos.map(function(t){ return t.id; }));
    var addedTodos = 0;
    (data.todos||[]).forEach(function(t) {
      if (t.id && !localTodoIds.has(t.id)) { db.todos.push(t); addedTodos++; }
    });
    saveData(db);
    var parts = [];
    if (added > 0) parts.push(added + ' 筆個案');
    if (addedTodos > 0) parts.push(addedTodos + ' 筆待辦');
    var summary = parts.length > 0 ? '新增 ' + parts.join('、') + '，' : '';
    ghStatus('✅ 合併完成！' + summary + '目前共 ' + db.cases.length + ' 筆');
    render();
  } catch(err) {
    ghStatus('❌ 下載失敗：' + err.message, true);
  }
}

function importJson(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cases) throw new Error('JSON 格式不正確');
      if (!confirm('匯入會覆蓋目前所有資料（' + db.cases.length + ' 筆個案），確定繼續？')) return;
      db.cases = data.cases || [];
      db.tracks = data.tracks || [];
      db.progress = data.progress || [];
      db.todos = data.todos || [];
      saveData(db);
      alert('✅ 匯入完成！共 ' + db.cases.length + ' 筆個案。');
      render();
    } catch(err) {
      alert('❌ 匯入失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function restoreArchive(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cases || !data.cases.length) throw new Error('找不到個案資料');
      const names = data.cases.map(c => c.id + ' ' + c.name).join('\n  ');
      if (!confirm('即將還原以下 ' + data.cases.length + ' 個個案：\n  ' + names + '\n\n已存在相同編號的個案會被覆蓋。確定繼續？')) return;

      // Merge: upsert by ID
      (data.cases || []).forEach(function(c) {
        const idx = db.cases.findIndex(x => x.id === c.id);
        if (idx >= 0) db.cases[idx] = c; else db.cases.push(c);
      });
      (data.tracks || []).forEach(function(t) {
        const idx = db.tracks.findIndex(x => x.id === t.id);
        if (idx >= 0) db.tracks[idx] = t; else db.tracks.push(t);
      });
      saveData(db);
      alert('✅ 還原完成！已加回 ' + data.cases.length + ' 個個案。');
      render();
    } catch(err) {
      alert('❌ 還原失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
    // 再來一輪
    setTimeout(() => {
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.4);
      });
    }, 1200);
  } catch(e) {}
}

      <div style="background:linear-gradient(135deg,${color},${colorEnd});padding:28px 24px;text-align:center">
        <div style="font-size:48px;margin-bottom:8px">${icon}</div>
        <div style="font-size:22px;font-weight:700;color:#fff">${title}</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.8);margin-top:4px">共 ${items.length} 項需要注意</div>
      </div>
      <div style="padding:20px 24px;max-height:300px;overflow-y:auto">${itemsHtml}</div>
      <div style="padding:16px 24px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:center">
        <button onclick="document.getElementById('reminder-overlay').remove();navigate('deadlines')" style="padding:12px 28px;background:${color};color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">查看期限</button>
        <button onclick="document.getElementById('reminder-overlay').remove();navigate('todos')" style="padding:12px 28px;background:#0072B2;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">查看待辦</button>
        <button onclick="document.getElementById('reminder-overlay').remove()" style="padding:12px 28px;background:#f0f0f0;color:#333;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">知道了</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  playAlertSound();
}

// ─── 統一提醒檢查（待辦 + 個案期限）─────────────────────────
let _reminderShownToday = {};

function checkAllReminders() {
  const now = new Date();
  const today = localToday();
  const alertItems = [];

  // 1) 待辦事項提醒
  if (db.todos) {
    db.todos.filter(t => !t.done).forEach(t => {
      // 提醒日期到了
      if (t.remind && !t._notified && new Date(t.remind) <= now) {
        t._notified = true;
        alertItems.push({
          title: '⏰ ' + t.title,
          subtitle: t.dueDate ? '到期：' + fmtDate(t.dueDate) : '待辦事項提醒',
          _type: 'overdue'
        });
      }
      // 到期日 14 天內或已逾期
      if (t.dueDate) {
        const daysTodo = Math.ceil((new Date(t.dueDate) - now) / 86400000);
        const keyTodo = 'todo-due-' + t.id + '-' + today;
        if (daysTodo <= 14 && !_reminderShownToday[keyTodo]) {
          _reminderShownToday[keyTodo] = true;
          if (daysTodo < 0) {
            alertItems.push({
              title: '🚨 待辦已逾期：' + t.title,
              subtitle: '已逾期 ' + Math.abs(daysTodo) + ' 天（' + fmtDate(t.dueDate) + '）',
              _type: 'overdue'
            });
          } else {
            alertItems.push({
              title: '📋 待辦即將到期：' + t.title,
              subtitle: '還剩 ' + daysTodo + ' 天（' + fmtDate(t.dueDate) + '）',
              _type: 'deadline'
            });
          }
        }
      }
      // 子細項到期日 7 天內
      if (t.subtasks) {
        t.subtasks.filter(s => !s.done && s.dueDate).forEach((s,i) => {
          const daysSub = Math.ceil((new Date(s.dueDate) - now) / 86400000);
          const keySub = 'todo-sub-' + t.id + '-' + i + '-' + today;
          if (daysSub <= 7 && !_reminderShownToday[keySub]) {
            _reminderShownToday[keySub] = true;
            if (daysSub < 0) {
              alertItems.push({
                title: '🚨 細項已逾期：' + s.title,
                subtitle: t.title + '・已逾期 ' + Math.abs(daysSub) + ' 天',
                _type: 'overdue'
              });
            } else {
              alertItems.push({
                title: '📋 細項即將到期：' + s.title,
                subtitle: t.title + '・還剩 ' + daysSub + ' 天',
                _type: 'deadline'
              });
            }
          }
        });
      }
    });
  }

  // 2) 個案截止日期 — 7天內到期或已逾期
  const activeTracks = db.tracks.filter(tr => {
    const c = db.cases.find(x => x.id === tr.caseId);
    return c && c.status !== '已給付' && c.status !== '已調解完成' && c.status !== '撤案';
  });

  activeTracks.forEach(tr => {
    const c = db.cases.find(x => x.id === tr.caseId);
    const cName = c ? c.name : tr.caseId;

    // 提醒日期 — 45天內或已逾期
    if (tr.deadline) {
      const days = Math.ceil((new Date(tr.deadline) - now) / 86400000);
      const key = 'deadline-' + tr.id + '-' + today;
      if (days <= 45 && !_reminderShownToday[key]) {
        _reminderShownToday[key] = true;
        if (days < 0) {
          alertItems.push({
            title: '🚨 ' + cName + '｜' + tr.name,
            subtitle: '提醒日已逾期 ' + Math.abs(days) + ' 天（' + fmtDate(tr.deadline) + '）',
            _type: 'overdue'
          });
        } else {
          alertItems.push({
            title: '🔔 ' + cName + '｜' + tr.name,
            subtitle: '提醒日期還剩 ' + days + ' 天（' + fmtDate(tr.deadline) + '）',
            _type: 'deadline'
          });
        }
      }
    }

    // 預計完成日 — 30天內或已逾期
    if (tr.plannedDate) {
      const days2 = Math.ceil((new Date(tr.plannedDate) - now) / 86400000);
      const key2 = 'planned-' + tr.id + '-' + today;
      if (days2 <= 30 && !_reminderShownToday[key2]) {
        _reminderShownToday[key2] = true;
        if (days2 < 0) {
          alertItems.push({
            title: '📋 ' + cName + '｜' + tr.name,
            subtitle: '預計完成日已逾期 ' + Math.abs(days2) + ' 天（' + fmtDate(tr.plannedDate) + '）',
            _type: 'overdue'
          });
        } else {
          alertItems.push({
            title: '📋 ' + cName + '｜' + tr.name,
            subtitle: '預計完成日還剩 ' + days2 + ' 天（' + fmtDate(tr.plannedDate) + '）',
            _type: 'deadline'
          });
        }
      }
    }
  });

  // 顯示提醒
  if (alertItems.length > 0) {
    showReminderAlert(alertItems, {
      title: '提醒通知',
      icon: '🔔',
      color: '#D55E00',
      colorEnd: '#e87a30'
    });
    swNotify(alertItems.map(t => t.title).join('\n'));
  }
}
// 請求通知權限
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
setInterval(checkAllReminders, 30000);
setTimeout(checkAllReminders, 2000); // 開頁面 2 秒後先檢查一次

// ─── PWA Service Worker ───────────────────────────────────────
if ('serviceWorker' in navigator && location.hostname.includes('github.io')) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('SW registered');
    // 接收 SW 的訊息（點通知時跳轉）
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'OPEN_TODOS') {
        navigate('todos');
      }
    });
  }).catch(err => console.log('SW failed:', err));
}

// 透過 SW 發送通知（比直接 new Notification 更可靠）
function swNotify(body) {
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'SHOW_NOTIFICATION', body: body });
  } else if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('待辦提醒', { body: body });
  }
}

// ─── Init ──────────────────────────────────────────────────────
// 清理孤立資料（個案已刪除但進度/追蹤軸殘留）
(function cleanOrphans() {
  const caseIds = new Set(db.cases.map(c => c.id));
  const before = db.progress.length + db.tracks.length;
  db.progress = db.progress.filter(p => caseIds.has(p.caseId));
  db.tracks = db.tracks.filter(t => caseIds.has(t.caseId));
  if (db.progress.length + db.tracks.length < before) saveData(db);
})();
render();
// 頁面載入後自動從 GitHub 拉取最新資料
setTimeout(ghAutoPull, 500);
</script>
